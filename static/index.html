<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARGUS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg:        #f8fafc;
  --surface:   #ffffff;
  --elevated:  #f1f5f9;
  --border:    #e2e8f0;
  --border-md: #cbd5e1;
  --border-hi: #94a3b8;
  --accent:    #2563eb;
  --accent-lo: rgba(37,99,235,0.06);
  --accent-md: rgba(37,99,235,0.12);
  --txt:       #0f172a;
  --txt-2:     #475569;
  --txt-3:     #94a3b8;
  --green:     #16a34a;  --green-lo:  #f0fdf4;
  --blue:      #2563eb;  --blue-lo:   #eff6ff;
  --yellow:    #d97706;  --yellow-lo: #fffbeb;
  --red:       #dc2626;  --red-lo:    #fef2f2;
  --orange:    #ea580c;  --orange-lo: #fff7ed;
  --purple:    #7c3aed;  --purple-lo: #f5f3ff;
  --cyan:      #0891b2;  --cyan-lo:   #ecfeff;
  --font: 'Outfit', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', 'DM Mono', 'Consolas', monospace;
  --r: 10px; --r-sm: 6px; --r-lg: 16px;
  --shadow: 0 4px 20px rgba(0,0,0,0.05);
  --glow-accent: 0 0 40px rgba(37,99,235,0.1);
}
::selection { background: rgba(37,99,235,0.15); }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 6px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-hi); }
html, body {
  min-height: 100vh;
  font-family: var(--font);
  background: var(--bg);
  color: var(--txt);
  line-height: 1.5;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(37,99,235,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(124,58,237,0.02) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}
@keyframes rowSlideIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeReveal {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes sectionReveal {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.reveal-in {
  animation: sectionReveal 0.5s cubic-bezier(0.16,1,0.3,1) both;
}
.header {
  position: sticky; top: 0; z-index: 100;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 clamp(20px, 4vw, 48px);
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.logo { display: flex; align-items: center; gap: 14px; }
.logo-mark {
  width: 34px; height: 34px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 14px; color: #fff;
  letter-spacing: -0.5px;
  box-shadow: 0 4px 12px rgba(37,99,235,0.2);
}
.logo-name {
  font-size: 16px; font-weight: 800; letter-spacing: 3px;
  color: var(--txt);
}
.logo-pipe { width: 1px; height: 18px; background: var(--border); }
.logo-sub { font-size: 11px; color: var(--txt-2); font-weight: 400; letter-spacing: 0.5px; }
.ver {
  font-size: 10px; font-family: var(--mono); color: var(--txt-2);
  padding: 3px 10px; border: 1px solid var(--border); border-radius: 20px;
  font-weight: 500;
}
.page {
  position: relative; z-index: 1;
  max-width: 1320px;
  margin: 0 auto;
  padding: 40px clamp(20px, 4vw, 48px) 80px;
  display: flex; flex-direction: column; gap: 32px;
}
.sec-label {
  font-size: 10px; font-weight: 700; letter-spacing: 2px;
  color: var(--txt-3); text-transform: uppercase; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.sec-label::before {
  content: ''; width: 3px; height: 12px; border-radius: 3px;
  background: var(--accent);
}
.target-wrap { position: relative; }
.target-input {
  width: 100%; height: 58px; padding: 0 160px 0 24px;
  background: var(--surface); border: 1px solid var(--border-md);
  border-radius: var(--r); font-family: var(--mono); font-size: 15px;
  color: var(--txt); outline: none; font-weight: 500;
  box-shadow: 0 2px 12px rgba(0,0,0,0.03);
  transition: all 200ms;
}
.target-input::placeholder { color: var(--txt-3); font-weight: 400; }
.target-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-lo), 0 4px 20px rgba(0,0,0,0.06);
}
.scan-btn {
  position: absolute; right: 9px; top: 50%; transform: translateY(-50%);
  height: 40px; padding: 0 28px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  border: none; border-radius: var(--r-sm);
  color: #fff; font-family: var(--font); font-size: 12px; font-weight: 700;
  letter-spacing: 1.2px; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 4px 12px rgba(37,99,235,0.25);
  transition: all 150ms;
}
.scan-btn:hover:not(:disabled) { opacity: 0.95; transform: translateY(-50%) translateY(-1px); }
.scan-btn:active:not(:disabled) { transform: translateY(-50%) translateY(0); }
.scan-btn:disabled { background: var(--border-hi); opacity: 0.5; cursor: not-allowed; box-shadow: none; }
.scan-btn.scanning { animation: scanPulse 2s ease infinite; }
@keyframes scanPulse { 0%,100%{opacity:1} 50%{opacity:0.8} }
.spin { width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: none; }
.scan-btn.scanning .spin { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }
.cfg-row { display: flex; gap: 12px; align-items: flex-start; }
.tools-drop { position: relative; flex: 1; }
.tools-trigger {
  width: 100%; height: 48px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px;
  background: var(--surface); border: 1px solid var(--border-md);
  border-radius: var(--r-sm); cursor: pointer; user-select: none;
  transition: all 150ms;
  box-shadow: 0 2px 8px rgba(0,0,0,0.02);
}
.tools-trigger:hover { border-color: var(--border-hi); }
.tools-trigger.open { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-lo); }
.trig-l { display: flex; align-items: center; gap: 10px; }
.trig-icon { font-size: 14px; color: var(--accent); }
.trig-lbl { font-size: 13px; font-weight: 600; color: var(--txt); }
.trig-cnt {
  font-size: 10px; font-weight: 700; padding: 2px 10px; border-radius: 20px;
  background: var(--accent-lo); color: var(--accent); font-family: var(--mono);
}
.trig-chev { font-size: 9px; color: var(--txt-3); transition: transform 250ms; }
.tools-trigger.open .trig-chev { transform: rotate(180deg); }
.tools-panel {
  position: absolute; top: calc(100% + 10px); left: 0; right: 0;
  background: var(--surface); border: 1px solid var(--border-md);
  border-radius: var(--r); overflow: hidden;
  box-shadow: 0 12px 32px rgba(0,0,0,0.1);
  z-index: 200; display: none;
  animation: popIn 200ms cubic-bezier(0.16,1,0.3,1);
}
.tools-panel.open { display: block; }
@keyframes popIn { from{opacity:0;transform:translateY(-10px) scale(0.98)} to{opacity:1;transform:none} }
.panel-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 12px; border-bottom: 1px solid var(--border);
}
.panel-ttl { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--txt-3); text-transform: uppercase; }
.panel-acts { display: flex; gap: 6px; }
.pa-btn {
  font-size: 11px; padding: 4px 12px; border: 1px solid var(--border-md);
  border-radius: 6px; background: transparent; color: var(--txt-2);
  cursor: pointer; font-family: var(--font); font-weight: 500; transition: all 150ms;
}
.pa-btn:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-lo); }
.tools-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 14px; }
.tool-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; border: 1px solid var(--border);
  border-radius: 8px; background: var(--bg);
  cursor: pointer; transition: all 150ms; user-select: none;
}
.tool-item:hover { border-color: var(--border-hi); background: var(--surface); }
.tool-item.on { border-color: var(--accent); background: var(--accent-lo); }
.tool-item.locked { opacity: 0.5; cursor: not-allowed; }
.tool-pip {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  background: var(--border-hi); transition: all 150ms;
}
.tool-item.on .tool-pip { background: var(--accent); }
.tool-n { font-size: 12px; font-weight: 600; }
.tool-d { font-size: 10px; color: var(--txt-3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.panel-foot {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 18px; border-top: 1px solid var(--border); background: var(--bg);
}
.wl-lbl { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--txt-3); text-transform: uppercase; }
.wl-seg { display: flex; border: 1px solid var(--border-md); border-radius: 7px; overflow: hidden; background: var(--surface); }
.wl-btn {
  padding: 5px 14px; font-size: 11px; border: none; cursor: pointer;
  font-family: var(--font); font-weight: 600; background: transparent;
  color: var(--txt-2); transition: all 150ms;
}
.wl-btn.on { background: var(--accent); color: #fff; }
.wl-field { flex: 1; height: 32px; padding: 0 12px; font-size: 11px; background: var(--surface); color: var(--txt); border: 1px solid var(--border-md); border-radius: 7px; font-family: var(--mono); outline: none; display: none; }
.wl-field.show { display: block; }
.elapsed-box {
  flex-shrink: 0; height: 48px; padding: 0 20px; min-width: 100px;
  background: var(--surface); border: 1px solid var(--border-md);
  border-radius: var(--r-sm); display: flex; align-items: center; gap: 10px;
  font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--txt-2);
}
.el-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border-hi); }
.el-dot.live { background: var(--green); animation: pulse 1.5s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.4)} }
.progress-section {
  background: var(--surface);
  border: 1px solid var(--border-md);
  border-radius: var(--r-lg);
  padding: 24px 28px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.pipeline {
  display: flex; align-items: center; gap: 0; overflow-x: auto;
  padding-bottom: 6px;
}
.pipe-step {
  display: flex; flex-direction: column; align-items: center;
  gap: 8px; min-width: 90px; padding: 0 10px; position: relative;
  flex-shrink: 0;
}
.pipe-step:not(:first-child)::before {
  content: '';
  position: absolute; left: 0; top: 16px;
  border-top: 1px dashed var(--border-md);
  width: 100%;
  transform: translateX(-50%);
  z-index: 0;
}
.pipe-icon {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; z-index: 1;
  background: var(--elevated); border: 2px solid var(--border-md);
  color: var(--txt-3); transition: all 300ms;
}
.pipe-step[data-state="running"] .pipe-icon { background: var(--accent-lo); border-color: var(--accent); color: var(--accent); }
.pipe-step[data-state="done"] .pipe-icon { background: var(--green-lo); border-color: var(--green); color: var(--green); }
.pipe-step[data-state="skipped"] .pipe-icon { opacity: 0.5; }
.pipe-step[data-state="error"] .pipe-icon { background: var(--red-lo); border-color: var(--red); color: var(--red); }
.pipe-spinner {
  width: 15px; height: 15px; border: 2px solid var(--accent-md);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .6s linear infinite;
}
.pipe-name { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--txt-2); text-transform: uppercase; }
.pipe-count { font-size: 10px; font-family: var(--mono); color: var(--txt-3); min-height: 14px; }
.stats-bar {
  display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px;
  padding-top: 18px; border-top: 1px solid var(--border);
}
.stat-chip {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 16px; border-radius: 10px; border: 1px solid var(--border-md);
  background: var(--elevated); font-size: 12px;
  animation: fadeReveal 0.3s ease both;
}
.stat-val { font-family: var(--mono); font-weight: 700; font-size: 16px; color: var(--accent); }
.stat-label { color: var(--txt-2); font-size: 11px; font-weight: 500; }
.results-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.global-export { display: flex; align-items: center; gap: 8px; }
.exp-btn {
  padding: 6px 16px; border: 1px solid var(--border-md); border-radius: 8px;
  background: var(--surface); color: var(--txt-2); font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: var(--font); transition: all 150ms;
}
.exp-btn:hover:not(:disabled) { background: var(--accent); color: #fff; border-color: var(--accent); }
.exp-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.result-panel {
  background: var(--surface); border: 1px solid var(--border-md);
  border-radius: var(--r-lg); overflow: hidden;
  box-shadow: var(--shadow);
  margin-bottom: 14px;
  transition: all 300ms;
}
.result-panel.active { border-color: var(--accent); }
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; cursor: pointer; user-select: none;
  background: var(--elevated); gap: 12px; transition: background 150ms;
}
.panel-header:hover { background: var(--border); }
.ph-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
.ph-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.panel-tool-badge {
  font-size: 9px; font-weight: 700; padding: 4px 10px;
  border-radius: 6px; text-transform: uppercase; letter-spacing: 1px;
}
.t-httpx   { background: var(--green-lo);  color: var(--green); }
.t-nmap    { background: var(--red-lo);    color: var(--red); }
.t-dig     { background: var(--cyan-lo);   color: var(--cyan); }
.t-whois   { background: var(--cyan-lo);   color: var(--cyan); }
.t-wafw00f { background: var(--orange-lo); color: var(--orange); }
.t-whatweb { background: var(--purple-lo); color: var(--purple); }
.t-ffuf    { background: var(--yellow-lo); color: var(--yellow); }
.panel-title { font-size: 13px; font-weight: 600; color: var(--txt); }
.panel-count {
  font-size: 11px; font-family: var(--mono); font-weight: 700;
  padding: 2px 8px; border-radius: 20px;
  background: var(--accent-lo); color: var(--accent);
}
.panel-search {
  height: 30px; padding: 0 10px; width: 150px;
  background: var(--surface); border: 1px solid var(--border-md);
  border-radius: 6px; font-size: 11px; font-family: var(--mono);
  color: var(--txt); outline: none;
}
.panel-search:focus { border-color: var(--accent); }
.panel-csv-btn {
  padding: 4px 12px; border: 1px solid var(--border-md); border-radius: 6px;
  background: var(--surface); color: var(--txt-2); font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: var(--font);
}
.panel-csv-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.panel-chevron { font-size: 10px; color: var(--txt-3); transition: transform 250ms; }
.result-panel.collapsed .panel-chevron { transform: rotate(-90deg); }
.panel-body { max-height: 600px; overflow-y: auto; transition: max-height 300ms; }
.result-panel.collapsed .panel-body { max-height: 0; }
.panel-empty { padding: 40px; text-align: center; color: var(--txt-3); font-size: 12px; }
.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  padding: 10px 18px; color: var(--txt-2); font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px; text-align: left;
  border-bottom: 1px solid var(--border); background: var(--elevated);
  position: sticky; top: 0; z-index: 2;
}
.data-table th.sortable { cursor: pointer; }
.data-table th.sortable:hover { color: var(--accent); }
.data-table td { padding: 10px 18px; border-bottom: 1px solid var(--border); font-size: 12px; }
.data-table tr:hover td { background: var(--accent-lo); }
.data-table tr.filtered { display: none; }
.mono { font-family: var(--mono); }
.mono-link { font-family: var(--mono); color: var(--accent); text-decoration: none; font-size: 12px; }
.mono-link:hover { text-decoration: underline; }
.sc-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-family: var(--mono); font-size: 11px; font-weight: 700; }
.sc-badge.s2xx { background: var(--green-lo);  color: var(--green); }
.sc-badge.s3xx { background: var(--blue-lo);   color: var(--blue); }
.sc-badge.s4xx { background: var(--yellow-lo); color: var(--yellow); }
.sc-badge.s5xx { background: var(--red-lo);    color: var(--red); }
.sc-badge.s0   { background: var(--elevated); color: var(--txt-3); }
.state-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-family: var(--mono); font-size: 11px; font-weight: 600; }
.state-open     { background: var(--green-lo);  color: var(--green); }
.state-closed   { background: var(--red-lo);    color: var(--red); }
.state-filtered { background: var(--elevated); color: var(--txt-3); }
.tech-chip { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; background: var(--elevated); border: 1px solid var(--border); color: var(--txt-2); margin: 2px 2px 2px 0; font-family: var(--mono); }
.whois-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--border); }
.whois-cell { background: var(--surface); padding: 16px 20px; }
.whois-cell--full { grid-column: 1 / -1; }
.whois-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--txt-3); text-transform: uppercase; margin-bottom: 4px; }
.whois-value { font-size: 13px; font-family: var(--mono); color: var(--txt); }
.dns-type-header { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--cyan); text-transform: uppercase; padding: 8px 18px; background: var(--cyan-lo); border-bottom: 1px solid var(--border); }
.waf-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1px; background: var(--border); }
.waf-card { background: var(--surface); padding: 14px 18px; display: flex; align-items: flex-start; gap: 12px; }
.waf-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.waf-on  { background: var(--red); }
.waf-off { background: var(--green); }
.waf-url { font-family: var(--mono); font-size: 12px; color: var(--txt); word-break: break-all; margin-bottom: 2px; }
.waf-name { font-weight: 700; color: var(--red); font-size: 12px; }
.waf-none { color: var(--green); font-size: 12px; }
.waf-vendor { font-size: 11px; color: var(--txt-3); }
.ffuf-host-header { padding: 10px 18px; background: var(--elevated); border-bottom: 1px solid var(--border); font-size: 11px; display: flex; align-items: center; gap: 10px; }
.fuzz-label { font-size: 9px; font-weight: 700; color: var(--yellow); text-transform: uppercase; background: var(--yellow-lo); padding: 2px 6px; border-radius: 4px; }
.fuzz-target { font-family: var(--mono); color: var(--txt); }
.hist-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
.hist-chev { font-size: 9px; color: var(--txt-3); transition: transform 250ms; }
.hist-toggle.open .hist-chev { transform: rotate(90deg); }
.hist-body { display: none; margin-top: 14px; }
.hist-toggle.open + .hist-body { display: block; }
.hist-card { background: var(--surface); border: 1px solid var(--border-md); border-radius: var(--r-lg); overflow: hidden; box-shadow: var(--shadow); }
.h-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.h-table th { padding: 10px 20px; color: var(--txt-2); font-size: 10px; font-weight: 700; text-transform: uppercase; text-align: left; border-bottom: 1px solid var(--border); background: var(--elevated); }
.h-table td { padding: 10px 20px; border-bottom: 1px solid var(--border); }
.s-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
.s-running{background:var(--orange-lo);color:var(--orange)}
.s-completed{background:var(--green-lo);color:var(--green)}
.s-error{background:var(--red-lo);color:var(--red)}

.h-view { padding: 4px 10px; border: 1px solid var(--border-md); border-radius: 6px; background: var(--surface); color: var(--txt-2); font-size: 11px; font-weight: 600; cursor: pointer; transition: all 150ms; }
.h-view:hover { color: var(--accent); border-color: var(--accent); }
.h-empty { padding: 30px; text-align: center; color: var(--txt-3); font-size: 12px; }

</style>
</head>
<body>
<header class="header">
  <div class="logo">
    <div class="logo-mark">A</div>
    <span class="logo-name">ARGUS</span>
    <div class="logo-pipe"></div>
    <span class="logo-sub">Automated Recon &amp; Gathering Utility System</span>
  </div>
  <span class="ver">v1.1</span>
</header>
<div class="page">
  <div>
    <div class="sec-label">Target</div>
    <div class="target-wrap">
      <input class="target-input" id="domainInput" placeholder="example.com" autocomplete="off" spellcheck="false">
      <button class="scan-btn" id="scanBtn" onclick="startScan()">
        <div class="spin"></div>
        <span id="btnLbl">SCAN</span>
      </button>
    </div>
  </div>
  <div>
    <div class="sec-label">Configuration</div>
    <div class="cfg-row">
      <div class="tools-drop" id="toolsDrop">
        <div class="tools-trigger" id="toolsTrigger" onclick="toggleDropdown()">
          <div class="trig-l">
            <span class="trig-icon">&#9881;</span>
            <span class="trig-lbl">Recon Tools</span>
            <span class="trig-cnt" id="toolsCount">0</span>
          </div>
          <span class="trig-chev">&#9660;</span>
        </div>
        <div class="tools-panel" id="toolsPanel">
          <div class="panel-hdr">
            <span class="panel-ttl">Select Tools</span>
            <div class="panel-acts">
              <button class="pa-btn" onclick="selectAll()">All</button>
              <button class="pa-btn" onclick="selectNone()">None</button>
            </div>
          </div>
          <div class="tools-grid" id="toolsGrid"></div>
          <div class="panel-foot">
            <span class="wl-lbl">Wordlist</span>
            <div class="wl-seg">
              <button class="wl-btn on" id="wlDef" onclick="setWl('default')">Default</button>
              <button class="wl-btn" id="wlCust" onclick="setWl('custom')">Custom</button>
            </div>
            <input class="wl-field" id="wlPath" placeholder="/path/to/wordlist.txt" spellcheck="false">
          </div>
        </div>
      </div>
      <div class="elapsed-box">
        <div class="el-dot" id="elDot"></div>
        <span id="elTime">00:00</span>
      </div>
    </div>
  </div>
  <div id="progressSection" style="display:none">
    <div class="progress-section">
      <div class="sec-label">Scan Progress</div>
      <div class="pipeline" id="pipeline"></div>
      <div class="stats-bar" id="statsBar"></div>
    </div>
  </div>
  <div id="resultsSection" style="display:none">
    <div class="results-header">
      <div class="sec-label" style="margin:0">Results</div>
      <div class="global-export">
        <button class="exp-btn" id="expPdf" onclick="doExport('pdf')" disabled>PDF Report</button>
        <button class="exp-btn" id="expCsv" onclick="doExport('csv')" disabled>Full CSV</button>
      </div>
    </div>
    <div id="resultPanels"></div>
  </div>
  <div>
    <div class="hist-toggle" id="histToggle" onclick="toggleHist()">
      <span class="hist-chev">&#9654;</span>
      <span class="sec-label" style="margin:0">Scan History <span id="histCount" style="color:var(--txt-3);font-weight:400">(0)</span></span>
    </div>
    <div class="hist-body" id="histBody">
      <div class="hist-card">
        <table class="h-table">
          <thead><tr><th>Domain</th><th>Status</th><th>Tools</th><th>Started</th><th>Duration</th><th></th></tr></thead>
          <tbody id="histRows"></tbody>
        </table>
        <div class="h-empty" id="histEmpty">No scans recorded yet</div>
      </div>
    </div>
  </div>
</div>
<script>
const STATE = {
  scanning: false, scanId: null, domain: null, timerStart: 0, timerInterval: null, eventSource: null,
  selectedTools: new Set(), toolsMeta: {}, wordlistMode: 'default', panelOpen: false, store: {}, pipeline: {},
  stats: { subdomains: 0, liveHosts: 0, openPorts: 0, wafsDetected: 0, techs: new Set() }, ffufHosts: new Set(), firstResultScrolled: false
};
const TOOL_INFO = {
  httpx: { label: 'HTTP Probing', desc: 'Subdomains & HTTP probe' }, nmap: { label: 'Port Scan', desc: 'Open ports & services' },
  dig: { label: 'DNS Records', desc: 'A, MX, NS, TXT, CNAME' }, whois: { label: 'WHOIS', desc: 'Domain registration info' },
  wafw00f: { label: 'WAF Detect', desc: 'Firewall detection' }, whatweb: { label: 'Tech Fingerprint', desc: 'CMS, frameworks, stack' },
  ffuf: { label: 'Dir Fuzz', desc: 'Hidden paths & endpoints' }
};
const $ = id => document.getElementById(id);
function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}
function statusClass(sc) {
  sc = +sc;
  if (sc >= 200 && sc < 300) return 's2xx';
  if (sc >= 300 && sc < 400) return 's3xx';
  if (sc >= 400 && sc < 500) return 's4xx';
  if (sc >= 500) return 's5xx';
  return 's0';
}
function safeUrl(url) {
  try {
    const u = new URL(url);
    if (u.protocol !== 'http:' && u.protocol !== 'https:') return null;
    return u.href;
  } catch { return null; }
}
function scrollToResults() {
  if (!STATE.firstResultScrolled && STATE.scanning) {
    STATE.firstResultScrolled = true;
    const el = $('resultsSection');
    if (el) setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'start' }), 200);
  }
}
async function loadTools() {
  try {
    const r = await fetch('/tools'), d = await r.json();
    STATE.toolsMeta = d.tools;
    const defs = d.defaults || [], grid = $('toolsGrid');
    grid.innerHTML = '';
    Object.entries(STATE.toolsMeta).sort((a, b) => a[1].order - b[1].order).forEach(([id, info]) => {
      if (defs.includes(id)) STATE.selectedTools.add(id);
      const el = document.createElement('div');
      el.className = 'tool-item' + (defs.includes(id) ? ' on' : '');
      el.dataset.tool = id;
      el.onclick = () => { if (!STATE.scanning) toggleTool(id, el); };
      el.innerHTML = `<div class="tool-pip"></div><div><div class="tool-n">${esc(info.name || id)}</div><div class="tool-d">${esc(info.description || '')}</div></div>`;
      grid.appendChild(el);
    });
    updateCount();
  } catch (e) { console.error(e); }
}
function toggleTool(id, el) {
  STATE.selectedTools.has(id) ? (STATE.selectedTools.delete(id), el.classList.remove('on')) : (STATE.selectedTools.add(id), el.classList.add('on'));
  updateCount();
}
function selectAll() { document.querySelectorAll('.tool-item').forEach(el => { STATE.selectedTools.add(el.dataset.tool); el.classList.add('on'); }); updateCount(); }
function selectNone() { document.querySelectorAll('.tool-item').forEach(el => { STATE.selectedTools.delete(el.dataset.tool); el.classList.remove('on'); }); updateCount(); }
function updateCount() { $('toolsCount').textContent = STATE.selectedTools.size; }
function toggleDropdown() { STATE.panelOpen = !STATE.panelOpen; $('toolsPanel').classList.toggle('open', STATE.panelOpen); $('toolsTrigger').classList.toggle('open', STATE.panelOpen); }
document.addEventListener('click', e => { if (STATE.panelOpen && !$('toolsDrop').contains(e.target)) { STATE.panelOpen = false; $('toolsPanel').classList.remove('open'); $('toolsTrigger').classList.remove('open'); } });
function setWl(m) { STATE.wordlistMode = m; $('wlDef').classList.toggle('on', m === 'default'); $('wlCust').classList.toggle('on', m === 'custom'); $('wlPath').classList.toggle('show', m === 'custom'); }
$('domainInput').addEventListener('keydown', e => { if (e.key === 'Enter' && !STATE.scanning) startScan(); });
async function startScan() {
  const domain = $('domainInput').value.trim();
  if (!domain || STATE.scanning) return;
  if (!/^(?:[a-zA-Z0-9](?:[a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?\.)+[a-zA-Z]{2,}$/.test(domain)) { alert('Invalid domain'); return; }
  if (!STATE.selectedTools.size) { alert('Select at least one tool'); return; }
  const wl = STATE.wordlistMode === 'custom' ? ($('wlPath').value.trim() || 'default') : 'default';
  try {
    const res = await fetch('/scan', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ domain, tools: [...STATE.selectedTools], wordlist: wl }) });
    if (!res.ok) { const e = await res.json(); alert(e.detail || 'Error'); return; }
    const d = await res.json(); STATE.scanId = d.scan_id; STATE.domain = domain;
    setScan(true); clearResults(); startTimer(); connectSSE(STATE.scanId);
  } catch (e) { alert(e.message); }
}
function setScan(on) {
  STATE.scanning = on;
  const btn = $('scanBtn'); btn.disabled = on; btn.classList.toggle('scanning', on);
  $('btnLbl').textContent = on ? 'SCANNING' : 'SCAN';
  $('domainInput').disabled = on;
  $('elDot').classList.toggle('live', on);
  if (!on) $('elDot').style.background = 'var(--green)';
  $('expPdf').disabled = true; $('expCsv').disabled = true;
  document.querySelectorAll('.tool-item').forEach(el => el.classList.toggle('locked', on));
}
function clearResults() {
  STATE.store = {}; STATE.pipeline = {}; STATE.stats = { subdomains: 0, liveHosts: 0, openPorts: 0, wafsDetected: 0, techs: new Set() }; STATE.ffufHosts = new Set(); STATE.firstResultScrolled = false;
  $('pipeline').innerHTML = ''; $('resultPanels').innerHTML = ''; $('statsBar').innerHTML = '';
  $('progressSection').style.display = 'none'; $('resultsSection').style.display = 'none';
}
function startTimer() {
  STATE.timerStart = Date.now(); clearInterval(STATE.timerInterval);
  STATE.timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - STATE.timerStart) / 1000);
    $('elTime').textContent = String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
  }, 1000);
}
function finishScan(status) {
  setScan(false); clearInterval(STATE.timerInterval);
  if (status === 'completed') { $('expPdf').disabled = false; $('expCsv').disabled = false; }
  loadHistory();
  Object.keys(STATE.pipeline).forEach(tool => { if (STATE.pipeline[tool] === 'running' || STATE.pipeline[tool] === 'pending') if (status === 'error') setPipeState(tool, 'error'); });
}
function connectSSE(id) {
  if (STATE.eventSource) STATE.eventSource.close();
  STATE.eventSource = new EventSource('/scan/' + id + '/stream');
  STATE.eventSource.onmessage = e => {
    let d; try { d = JSON.parse(e.data); } catch { return; }
    switch (d.type) {
      case 'plan': onPlan(d); break;
      case 'status': if (['completed','error','timeout'].includes(d.status)) finishScan(d.status); break;
      case 'step_start': setPipeState(d.tool, 'running'); setActivePanel(d.tool, true); break;
      case 'step_done': setPipeState(d.tool, 'done', d.count); setActivePanel(d.tool, false); break;
      case 'step_skip': setPipeState(d.tool, 'skipped'); break;
      case 'line': onLine(d); break;
      case 'done': STATE.eventSource.close(); STATE.eventSource = null; break;
    }
  };
  STATE.eventSource.onerror = () => { STATE.eventSource.close(); STATE.eventSource = null; if (STATE.scanning) finishScan('error'); };
}
function onPlan(event) {
  const tools = event.tools || [];
  tools.forEach(t => { STATE.store[t] = t === 'whois' ? {} : []; STATE.pipeline[t] = 'pending'; });
  buildPipelineBar(tools); buildResultPanels(tools);
  $('progressSection').style.display = ''; $('resultsSection').style.display = '';
  $('progressSection').querySelector('.progress-section').classList.add('reveal-in');
}
function onLine(event) {
  const { tool, data } = event; if (!data || typeof data !== 'object' || !Object.keys(data).length) return;
  switch (tool) {
    case 'httpx': ingestHttpx(data); break;
    case 'nmap': ingestNmap(data); break;
    case 'dig': ingestDig(data); break;
    case 'whois': ingestWhois(data); break;
    case 'wafw00f': ingestWafw00f(data); break;
    case 'whatweb': ingestWhatweb(data); break;
    case 'ffuf': ingestFfuf(data); break;
  }
}
function buildPipelineBar(tools) {
  const pipe = $('pipeline'); pipe.innerHTML = '';
  tools.forEach((tool, i) => {
    if (i > 0) { const c = document.createElement('div'); c.className = 'pipe-connector'; pipe.appendChild(c); }
    const step = document.createElement('div'); step.className = 'pipe-step'; step.id = 'pipe-' + tool; step.dataset.tool = tool; step.dataset.state = 'pending';
    step.innerHTML = `<div class="pipe-icon" id="pipe-icon-${esc(tool)}">&#9675;</div><div class="pipe-name">${esc(tool)}</div><div class="pipe-count" id="pipe-count-${esc(tool)}"></div>`;
    pipe.appendChild(step);
  });
}
function setPipeState(tool, state, count) {
  STATE.pipeline[tool] = state; const step = $('pipe-' + tool); if (!step) return;
  step.dataset.state = state; const icon = $('pipe-icon-' + tool);
  if (icon) {
    if (state === 'running') icon.innerHTML = '<div class="pipe-spinner"></div>';
    else if (state === 'done') icon.textContent = '\u2713';
    else if (state === 'skipped') icon.textContent = '\u2014';
    else if (state === 'error') icon.textContent = '\u2715';
    else icon.textContent = '\u25CB';
  }
  const countEl = $('pipe-count-' + tool); if (countEl && count !== undefined) countEl.textContent = count + ' results';
}
function setActivePanel(tool, active) {
  const panel = $('panel-' + tool); if (panel) { panel.classList.toggle('active', active); if (active && STATE.scanning) setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 150); }
}
function buildResultPanels(tools) {
  const container = $('resultPanels'); container.innerHTML = '';
  tools.forEach((tool, idx) => {
    const info = TOOL_INFO[tool] || { label: tool, desc: '' }, panel = document.createElement('div');
    panel.className = 'result-panel'; panel.id = 'panel-' + tool; panel.style.animationDelay = (idx * 0.05) + 's';
    panel.innerHTML = `
      <div class="panel-header" onclick="togglePanel('${esc(tool)}')">
        <div class="ph-left"><span class="panel-tool-badge t-${esc(tool)}">${esc(tool)}</span><span class="panel-title">${esc(info.label)}</span><span class="panel-count" id="pcount-${esc(tool)}" style="display:none">0</span></div>
        <div class="ph-right">
          <input class="panel-search" id="psearch-${esc(tool)}" placeholder="Filter..." onclick="event.stopPropagation()" oninput="filterPanel('${esc(tool)}')">
          <button class="panel-csv-btn" onclick="event.stopPropagation();exportSection('${esc(tool)}')">CSV</button>
          <span class="panel-chevron">&#9660;</span>
        </div>
      </div>
      <div class="panel-body" id="pbody-${esc(tool)}">${buildPanelBody(tool)}</div>`;
    container.appendChild(panel);
  });
}
function buildPanelBody(tool) {
  switch (tool) {
    case 'httpx': return `<div class="panel-empty" id="empty-httpx">Waiting for data...</div><table class="data-table" id="tbl-httpx" style="display:none"><thead><tr><th class="sortable" data-col="0">URL</th><th>Host</th><th>Status</th><th>Title</th><th>Tech</th></tr></thead><tbody id="tbody-httpx"></tbody></table>`;
    case 'nmap': return `<div class="panel-empty" id="empty-nmap">Waiting for data...</div><table class="data-table" id="tbl-nmap" style="display:none"><thead><tr><th>Port</th><th>Proto</th><th>State</th><th>Service</th><th>Version</th></tr></thead><tbody id="tbody-nmap"></tbody></table>`;
    case 'dig': return `<div class="panel-empty" id="empty-dig">Waiting for data...</div><div class="dns-container" id="dns-container" style="display:none"></div>`;
    case 'whois': return `<div class="panel-empty" id="empty-whois">Waiting for data...</div><div class="whois-grid" id="whois-grid" style="display:none"></div>`;
    case 'wafw00f': return `<div class="panel-empty" id="empty-wafw00f">Waiting for data...</div><div class="waf-grid" id="waf-grid" style="display:none"></div>`;
    case 'whatweb': return `<div class="panel-empty" id="empty-whatweb">Waiting for data...</div><table class="data-table" id="tbl-whatweb" style="display:none"><thead><tr><th>URL</th><th>Status</th><th>Tech</th></tr></thead><tbody id="tbody-whatweb"></tbody></table>`;
    case 'ffuf': return `<div class="panel-empty" id="empty-ffuf">Waiting for data...</div><div id="ffuf-container" style="display:none"><div id="ffuf-host-bar" class="ffuf-host-header" style="display:none"><span class="fuzz-label">Fuzzing</span><span class="fuzz-target" id="ffuf-host-label"></span></div><table class="data-table" id="tbl-ffuf"><thead><tr><th>URL</th><th>Status</th><th>Size</th><th>Words</th><th>Lines</th></tr></thead><tbody id="tbody-ffuf"></tbody></table></div>`;
    default: return `<div class="panel-empty">No display available.</div>`;
  }
}
function showContent(tool, c, t) { const e = $('empty-' + tool), co = $(c || 'tbl-' + tool); if (e) e.style.display = 'none'; if (co) co.style.display = ''; }
function togglePanel(t) { const p = $('panel-' + t); if (p) p.classList.toggle('collapsed'); }
function filterPanel(t) {
  const i = $('psearch-' + t); if (!i) return; const q = i.value.toLowerCase().trim(), b = $('tbody-' + t);
  if (b) b.querySelectorAll('tr').forEach(tr => tr.classList.toggle('filtered', q.length > 0 && !tr.textContent.toLowerCase().includes(q)));
  if (t === 'wafw00f') { const g = $('waf-grid'); if (g) g.querySelectorAll('.waf-card').forEach(c => c.classList.toggle('filtered', q.length > 0 && !c.textContent.toLowerCase().includes(q))); }
  if (t === 'dig') { const c = $('dns-container'); if (c) c.querySelectorAll('tr').forEach(tr => tr.classList.toggle('filtered', q.length > 0 && !tr.textContent.toLowerCase().includes(q))); }
}
function updatePanelCount(t, n) { const e = $('pcount-' + t); if (e) { e.textContent = n; e.style.display = n > 0 ? '' : 'none'; } }
function ingestHttpx(d) { if (!d.url) return; STATE.store.httpx = STATE.store.httpx || []; STATE.store.httpx.push(d); STATE.stats.liveHosts++; (d.tech || []).forEach(t => STATE.stats.techs.add(t)); showContent('httpx'); appendHttpxRow(d); updatePanelCount('httpx', STATE.store.httpx.length); updateStats(); scrollToResults(); }
function appendHttpxRow(d) {
  const b = $('tbody-httpx'); if (!b) return; const sc = d.status_code || 0, tech = (d.tech || []).map(t => `<span class="tech-chip">${esc(t)}</span>`).join(''), url = safeUrl(d.url), tr = document.createElement('tr');
  tr.innerHTML = `<td>${url ? `<a href="${esc(url)}" target="_blank" class="mono-link">${esc(d.url)}</a>` : `<span class="mono">${esc(d.url)}</span>`}</td><td class="mono" style="color:var(--txt-2)">${esc(d.host || '')}</td><td><span class="sc-badge ${statusClass(sc)}">${sc || '—'}</span></td><td style="color:var(--txt-2)">${esc(d.title || '')}</td><td>${tech || '—'}</td>`;
  b.appendChild(tr);
}
function ingestNmap(d) { STATE.store.nmap = STATE.store.nmap || []; STATE.store.nmap.push(d); if (d.port && d.state === 'open') STATE.stats.openPorts++; if (d.port) { showContent('nmap'); appendNmapRow(d); updatePanelCount('nmap', STATE.store.nmap.filter(r => r.port).length); updateStats(); scrollToResults(); } }
function appendNmapRow(d) {
  if (!d.port) return; const b = $('tbody-nmap'); if (!b) return; const s = d.state === 'open' ? 'state-open' : d.state === 'closed' ? 'state-closed' : 'state-filtered', tr = document.createElement('tr');
  tr.innerHTML = `<td class="mono">${esc(String(d.port))}/${esc(d.protocol || 'tcp')}</td><td>${esc(d.protocol || '')}</td><td><span class="state-badge ${s}">${esc(d.state || '')}</span></td><td>${esc(d.service || '')}</td><td style="color:var(--txt-2)">${esc(d.version || '')}</td>`;
  b.appendChild(tr);
}
function ingestDig(d) { if (!d.type) return; STATE.store.dig = STATE.store.dig || []; STATE.store.dig.push(d); showContent('dig', 'dns-container'); appendDigRow(d); updatePanelCount('dig', STATE.store.dig.length); scrollToResults(); }
function appendDigRow(d) {
  const c = $('dns-container'); if (!c) return; const t = d.type || 'OTHER', sid = 'dns-tbody-' + t; let b = $(sid);
  if (!b) { const s = document.createElement('div'); s.innerHTML = `<div class="dns-type-header">${esc(t)}</div><table class="data-table"><thead><tr><th>Name</th><th>TTL</th><th>Value</th></tr></thead><tbody id="${sid}"></tbody></table>`; c.appendChild(s); b = $(sid); }
  const tr = document.createElement('tr'); tr.innerHTML = `<td class="mono">${esc(d.name || '')}</td><td class="mono" style="color:var(--txt-3)">${esc(String(d.ttl || ''))}</td><td class="mono">${esc(d.value || '')}</td>`;
  b.appendChild(tr);
}
function ingestWhois(d) {
  if (!d.field) return; const s = STATE.store.whois = STATE.store.whois || {};
  if (d.field === 'name server') { s.ns = s.ns || []; if (!s.ns.includes(d.value)) s.ns.push(d.value); } else s[d.field] = d.value;
  showContent('whois', 'whois-grid'); renderWhoisCard(); updatePanelCount('whois', Object.keys(s).length + (s.ns ? s.ns.length - 1 : 0)); scrollToResults();
}
function renderWhoisCard() {
  const c = $('whois-grid'); if (!c) return; const w = STATE.store.whois || {}, f = [['Registrar',w['registrar']],['Created',w['creation']],['Expires',w['expiration']],['Updated',w['updated']],['Registrant',w['registrant']],['Org',w['org']],['Country',w['country']]];
  c.innerHTML = f.filter(([, v]) => v).map(([l, v]) => `<div class="whois-cell"><div class="whois-label">${esc(l)}</div><div class="whois-value">${esc(v)}</div></div>`).join('') + (w.ns ? `<div class="whois-cell whois-cell--full"><div class="whois-label">Name Servers</div>${w.ns.map(n => `<div class="mono" style="font-size:12px">${esc(n)}</div>`).join('')}</div>` : '');
}
function ingestWafw00f(d) { if (!d.url) return; STATE.store.wafw00f = STATE.store.wafw00f || []; STATE.store.wafw00f.push(d); if (d.waf_detected) STATE.stats.wafsDetected++; showContent('wafw00f', 'waf-grid'); appendWafCard(d); updatePanelCount('wafw00f', STATE.store.wafw00f.length); updateStats(); scrollToResults(); }
function appendWafCard(d) {
  const g = $('waf-grid'); if (!g) return; const de = d.waf_detected, u = safeUrl(d.url), c = document.createElement('div'); c.className = 'waf-card';
  c.innerHTML = `<div class="waf-status-dot ${de ? 'waf-on' : 'waf-off'}"></div><div><div class="waf-url">${u ? `<a href="${esc(u)}" target="_blank" class="mono-link">${esc(d.url)}</a>` : esc(d.url)}</div><div>${de ? `<span class="waf-name">${esc(d.waf_name)}</span>` : `<span class="waf-none">No WAF</span>`}</div></div>`;
  g.appendChild(c);
}
function ingestWhatweb(d) { if (!d.url) return; STATE.store.whatweb = STATE.store.whatweb || []; STATE.store.whatweb.push(d); (d.technologies || []).forEach(t => STATE.stats.techs.add(t)); showContent('whatweb'); appendWhatwebRow(d); updatePanelCount('whatweb', STATE.store.whatweb.length); updateStats(); scrollToResults(); }
function appendWhatwebRow(d) {
  const b = $('tbody-whatweb'); if (!b) return; const sc = d.status_code || 0, tech = (d.technologies || []).map(t => `<span class="tech-chip">${esc(t)}</span>`).join(''), u = safeUrl(d.url), tr = document.createElement('tr');

function ingestFfuf(d) {

}
function appendFfufRow(d) {
  const b = $('tbody-ffuf'); if (!b) return; const h = (d.host || '').replace(/\/$/,''), p = d.path || '', f = h + (p.startsWith('/')?p:'/'+p), sc = d.status_code || 0, u = safeUrl(f), tr = document.createElement('tr');
  tr.innerHTML = `<td>${u ? `<a href="${esc(u)}" target="_blank" class="mono-link">${esc(f)}</a>` : esc(f)}</td><td><span class="sc-badge ${statusClass(sc)}">${sc}</span></td><td class="mono">${esc(String(d.size))}</td><td class="mono">${esc(String(d.words))}</td><td class="mono">${esc(String(d.lines))}</td>`;
  b.appendChild(tr);

function updateStats() { const s = STATE.stats; const f = [{l:'Live',v:s.liveHosts},{l:'Ports',v:s.openPorts},{l:'WAF',v:s.wafsDetected},{l:'Tech',v:s.techs.size}]; $('statsBar').innerHTML = f.filter(d => d.v > 0).map(d => `<div class="stat-chip"><span class="stat-val">${d.v}</span><span class="stat-label">${d.l}</span></div>`).join(''); }
function exportSection(t) { const d = STATE.store[t]; if (!d) return; const c = buildCsv(t, d); if (!c) return; const b = new Blob([c], { type: 'text/csv;charset=utf-8;' }), u = URL.createObjectURL(b), a = document.createElement('a'); a.href = u; a.download = `argus_${t}.csv`; a.click(); }
function buildCsv(t, d) {
  const q = v => '"' + String(v ?? '').replace(/"/g, '""') + '"', row = r => r.map(q).join(',');
  if (t === 'whois') { const rows = [['Field', 'Value']]; Object.entries(d).forEach(([k, v]) => { if (Array.isArray(v)) v.forEach(n => rows.push([k, n])); else rows.push([k, v]); }); return rows.map(row).join('\r\n'); }
  const s = { httpx:{h:['URL','Host','Status','Title'],r:i=>[i.url,i.host,i.status_code,i.title]}, nmap:{h:['Port','Proto','State'],r:i=>i.port?[i.port,i.protocol,i.state]:null}, ffuf:{h:['URL','Status','Size'],r:i=>[i.path,i.status_code,i.size]} };

function doExport(f) { if (STATE.scanId) window.open('/scan/' + STATE.scanId + '/export/' + f, '_blank'); }
function toggleHist() { $('histToggle').classList.toggle('open'); }
async function loadHistory() {

async function viewScan(id) {
