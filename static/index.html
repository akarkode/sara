<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SARA — Simple Automated Recon App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-base: #0a0a0f;
  --bg-surface: #111118;
  --bg-elevated: #1a1a24;
  --border: #2a2a3a;
  --accent: #6366f1;
  --accent-glow: rgba(99,102,241,0.15);
  --text-primary: #f0f0f5;
  --text-muted: #6b7280;
  --green: #22c55e;
  --blue: #60a5fa;
  --yellow: #fbbf24;
  --red: #f87171;
  --orange: #fb923c;
  --font-body: 'DM Sans', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'Consolas', monospace;
}

::selection { background: rgba(99,102,241,0.3); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

html { font-size: 14px; }
body {
  font-family: var(--font-body);
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* --- Header --- */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 48px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
}
.header-left { display: flex; align-items: center; gap: 10px; }
.logo-mark {
  width: 28px; height: 28px; border-radius: 6px;
  background: var(--accent); display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; color: #fff;
}
.logo-text { font-weight: 700; font-size: 15px; letter-spacing: 1.5px; }
.header-right { display: flex; align-items: center; gap: 16px; }
.version-tag { font-size: 11px; color: var(--text-muted); }

/* --- Main Content --- */
.main { padding-top: 48px; }

/* --- Hero Input --- */
.hero {
  display: flex; flex-direction: column; align-items: center;
  padding: 48px 24px 40px;
  animation: fadeInUp 200ms ease;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}
.input-label {
  font-size: 11px; font-weight: 600; letter-spacing: 2px;
  color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase;
}
.input-wrapper {
  position: relative; width: 100%; max-width: 600px;
}
.domain-input {
  width: 100%; height: 52px; padding: 0 130px 0 20px;
  background: var(--bg-elevated); color: var(--text-primary);
  border: 1px solid var(--border); border-radius: 12px;
  font-family: var(--font-body); font-size: 15px;
  outline: none; transition: border-color 150ms, box-shadow 150ms;
}
.domain-input::placeholder { color: var(--text-muted); }
.domain-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.scan-btn {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  height: 40px; padding: 0 24px; border: none; border-radius: 10px;
  background: var(--accent); color: #fff; font-family: var(--font-body);
  font-size: 13px; font-weight: 600; letter-spacing: 0.5px;
  cursor: pointer; transition: opacity 150ms;
  display: flex; align-items: center; gap: 8px;
}
.scan-btn:hover { opacity: 0.9; }
.scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.spinner {
  width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff; border-radius: 50%;
  animation: spin 0.6s linear infinite; display: none;
}
.scan-btn.scanning .spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* --- Dashboard Grid --- */
.dashboard {
  display: grid; grid-template-columns: 280px 1fr;
  gap: 16px; padding: 0 24px 24px; max-width: 1200px; margin: 0 auto;
  min-height: 400px;
}
@media (max-width: 768px) {
  .dashboard { grid-template-columns: 1fr; }
}

/* --- Card base --- */
.card {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
}

/* --- Pipeline Panel --- */
.pipeline-card { display: flex; flex-direction: column; }
.card-title {
  font-size: 11px; font-weight: 600; letter-spacing: 2px;
  color: var(--text-muted); padding: 16px 16px 12px; text-transform: uppercase;
}
.pipeline-steps { flex: 1; padding: 0 16px; }
.step {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: 8px; margin-bottom: 4px;
  border-left: 3px solid transparent; transition: all 200ms ease;
}
.step.active {
  background: var(--accent-glow);
  border-left-color: var(--accent);
}
.step.done { border-left-color: var(--green); }
.step.skip .step-name { text-decoration: line-through; color: var(--text-muted); }
.step-number {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text-muted); min-width: 18px;
}
.step-name { font-weight: 500; font-size: 13px; flex: 1; }
.step-icon { font-size: 13px; min-width: 18px; text-align: center; }
.step.active .step-icon { color: var(--accent); }
.step.done .step-icon { color: var(--green); }

.pulse-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); display: none;
  animation: pulse 1.5s ease infinite;
}
.step.active .pulse-dot { display: block; }
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.4); }
}

.pipeline-footer { padding: 16px; }
.elapsed {
  font-family: var(--font-mono); font-size: 13px;
  color: var(--text-muted); margin-bottom: 10px;
}
.progress-bar {
  height: 2px; background: var(--border); border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%; width: 0%; background: var(--accent);
  transition: width 300ms ease;
}

.export-section { padding: 16px; display: flex; gap: 8px; }
.export-btn {
  flex: 1; padding: 8px 12px; border: 1px solid var(--accent);
  border-radius: 8px; background: transparent; color: var(--accent);
  font-family: var(--font-body); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 150ms; text-align: center;
}
.export-btn:hover { background: var(--accent); color: #fff; }
.export-btn:disabled {
  border-color: var(--border); color: var(--text-muted);
  cursor: not-allowed; background: transparent;
}

/* --- Terminal Panel --- */
.terminal-card { display: flex; flex-direction: column; min-height: 400px; }
.terminal-topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px; border-bottom: 1px solid var(--border);
}
.terminal-dots { display: flex; gap: 6px; }
.terminal-dots span {
  width: 10px; height: 10px; border-radius: 50%;
}
.dot-red { background: var(--red); }
.dot-yellow { background: var(--yellow); }
.dot-green { background: var(--green); }
.terminal-label {
  font-size: 11px; font-weight: 600; letter-spacing: 2px;
  color: var(--text-muted); text-transform: uppercase; flex: 1;
}
.copy-btn {
  padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px;
  background: transparent; color: var(--text-muted); font-size: 11px;
  cursor: pointer; font-family: var(--font-body);
}
.copy-btn:hover { color: var(--text-primary); border-color: var(--text-muted); }

.terminal-body {
  flex: 1; overflow-y: auto; padding: 16px;
  font-family: var(--font-mono); font-size: 13px; line-height: 1.6;
  background: var(--bg-base); position: relative;
}
.terminal-empty {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  color: var(--text-muted); text-align: center; font-size: 13px;
}
.blink-cursor::after {
  content: '|'; animation: blink 1s step-end infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; } 50% { opacity: 0; }
}

.log-line {
  display: flex; gap: 10px; align-items: baseline;
  animation: lineIn 80ms ease;
}
@keyframes lineIn { from { opacity: 0; } to { opacity: 1; } }
.log-ts { color: var(--text-muted); white-space: nowrap; font-size: 11px; }
.log-badge {
  font-size: 10px; font-weight: 600; padding: 1px 6px;
  border-radius: 4px; text-transform: uppercase; white-space: nowrap;
}
.badge-subfinder { background: rgba(96,165,250,0.15); color: var(--blue); }
.badge-httpx { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-ffuf { background: rgba(251,191,36,0.15); color: var(--yellow); }
.badge-nuclei { background: rgba(248,113,113,0.15); color: var(--red); }
.badge-system { background: rgba(107,114,128,0.15); color: var(--text-muted); }
.log-msg { color: var(--text-primary); word-break: break-all; }

.resume-scroll-btn {
  position: absolute; bottom: 12px; right: 12px;
  padding: 6px 14px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--bg-elevated); color: var(--text-muted); font-size: 11px;
  cursor: pointer; display: none; font-family: var(--font-body);
}
.resume-scroll-btn.visible { display: block; }

/* --- History --- */
.history-section {
  max-width: 1200px; margin: 16px auto 40px;
  padding: 0 24px;
}
.history-toggle {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 0; cursor: pointer; user-select: none;
}
.history-toggle-title {
  font-size: 11px; font-weight: 600; letter-spacing: 2px;
  color: var(--text-muted); text-transform: uppercase;
}
.history-arrow {
  font-size: 10px; color: var(--text-muted);
  transition: transform 200ms;
}
.history-toggle.open .history-arrow { transform: rotate(90deg); }
.history-content { display: none; }
.history-toggle.open + .history-content { display: block; }

.history-table {
  width: 100%; border-collapse: collapse;
  font-size: 13px;
}
.history-table th {
  text-align: left; padding: 8px 12px;
  color: var(--text-muted); font-weight: 500; font-size: 11px;
  text-transform: uppercase; letter-spacing: 1px;
  border-bottom: 1px solid var(--border);
}
.history-table td {
  padding: 10px 12px; border-bottom: 1px solid var(--border);
}
.status-badge {
  font-size: 11px; font-weight: 600; padding: 2px 8px;
  border-radius: 4px;
}
.status-running { background: rgba(251,146,60,0.15); color: var(--orange); }
.status-completed { background: rgba(34,197,94,0.15); color: var(--green); }
.status-error { background: rgba(248,113,113,0.15); color: var(--red); }
.status-queued { background: rgba(107,114,128,0.15); color: var(--text-muted); }

.view-btn {
  padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px;
  background: transparent; color: var(--text-muted); font-size: 11px;
  cursor: pointer; font-family: var(--font-body);
}
.view-btn:hover { color: var(--text-primary); border-color: var(--text-muted); }
.history-empty { color: var(--text-muted); padding: 20px 0; text-align: center; }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <div class="logo-mark">S</div>
    <span class="logo-text">SARA</span>
  </div>
  <div class="header-right">
    <span class="version-tag">v1.0</span>
  </div>
</header>

<!-- Main -->
<main class="main">

  <!-- Hero Input -->
  <section class="hero">
    <div class="input-label">Target</div>
    <div class="input-wrapper">
      <input type="text" class="domain-input" id="domainInput" placeholder="target domain..." autocomplete="off" spellcheck="false">
      <button class="scan-btn" id="scanBtn" onclick="startScan()">
        <span class="spinner"></span>
        <span class="btn-text">SCAN</span>
      </button>
    </div>
  </section>

  <!-- Dashboard -->
  <div class="dashboard">

    <!-- Pipeline Panel -->
    <div class="card pipeline-card">
      <div class="card-title">Pipeline</div>
      <div class="pipeline-steps">
        <div class="step" id="step-subfinder" data-step="subfinder">
          <span class="step-number">01</span>
          <span class="step-name">subfinder</span>
          <span class="pulse-dot"></span>
          <span class="step-icon" id="icon-subfinder"></span>
        </div>
        <div class="step" id="step-httpx" data-step="httpx">
          <span class="step-number">02</span>
          <span class="step-name">httpx</span>
          <span class="pulse-dot"></span>
          <span class="step-icon" id="icon-httpx"></span>
        </div>
        <div class="step" id="step-ffuf" data-step="ffuf">
          <span class="step-number">03</span>
          <span class="step-name">ffuf</span>
          <span class="pulse-dot"></span>
          <span class="step-icon" id="icon-ffuf"></span>
        </div>
        <div class="step" id="step-nuclei" data-step="nuclei">
          <span class="step-number">04</span>
          <span class="step-name">nuclei</span>
          <span class="pulse-dot"></span>
          <span class="step-icon" id="icon-nuclei"></span>
        </div>
      </div>
      <div class="pipeline-footer">
        <div class="elapsed" id="elapsed">00:00</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <div class="export-section">
        <button class="export-btn" id="exportPdf" onclick="exportPdf()" disabled>Export PDF</button>
        <button class="export-btn" id="exportCsv" onclick="exportCsv()" disabled>Export CSV</button>
      </div>
    </div>

    <!-- Terminal Panel -->
    <div class="card terminal-card">
      <div class="terminal-topbar">
        <div class="terminal-dots">
          <span class="dot-red"></span>
          <span class="dot-yellow"></span>
          <span class="dot-green"></span>
        </div>
        <span class="terminal-label">Output</span>
        <button class="copy-btn" onclick="copyOutput()">Copy</button>
      </div>
      <div class="terminal-body" id="terminalBody">
        <div class="terminal-empty" id="terminalEmpty">
          <span class="blink-cursor">Awaiting target...</span>
        </div>
        <button class="resume-scroll-btn" id="resumeScroll" onclick="resumeAutoScroll()">Resume scroll</button>
      </div>
    </div>

  </div>

  <!-- Scan History -->
  <section class="history-section">
    <div class="history-toggle" id="historyToggle" onclick="toggleHistory()">
      <span class="history-arrow">&#9654;</span>
      <span class="history-toggle-title" id="historyTitle">History (0)</span>
    </div>
    <div class="history-content" id="historyContent">
      <table class="history-table">
        <thead>
          <tr>
            <th>Domain</th>
            <th>Status</th>
            <th>Started</th>
            <th>Duration</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="historyBody"></tbody>
      </table>
      <div class="history-empty" id="historyEmpty">No scans yet</div>
    </div>
  </section>

</main>

<script>
// --- State ---
let currentScanId = null;
let scanning = false;
let autoScroll = true;
let timerInterval = null;
let timerStart = 0;
let eventSource = null;

const tools = ['subfinder', 'httpx', 'ffuf', 'nuclei'];
const stepProgress = { subfinder: 25, httpx: 50, ffuf: 75, nuclei: 100 };

// --- DOM refs ---
const domainInput = document.getElementById('domainInput');
const scanBtn = document.getElementById('scanBtn');
const terminalBody = document.getElementById('terminalBody');
const terminalEmpty = document.getElementById('terminalEmpty');
const resumeScrollBtn = document.getElementById('resumeScroll');
const progressFill = document.getElementById('progressFill');
const elapsedEl = document.getElementById('elapsed');
const exportPdfBtn = document.getElementById('exportPdf');
const exportCsvBtn = document.getElementById('exportCsv');

// Enter key to scan
domainInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !scanning) startScan();
});

// Auto-scroll detection
terminalBody.addEventListener('scroll', () => {
  const { scrollTop, scrollHeight, clientHeight } = terminalBody;
  const atBottom = scrollHeight - scrollTop - clientHeight < 40;
  autoScroll = atBottom;
  resumeScrollBtn.classList.toggle('visible', !atBottom && scanning);
});

function resumeAutoScroll() {
  autoScroll = true;
  terminalBody.scrollTop = terminalBody.scrollHeight;
  resumeScrollBtn.classList.remove('visible');
}

// --- Scan ---
async function startScan() {
  const domain = domainInput.value.trim();
  if (!domain || scanning) return;

  // Validate domain client-side
  if (!/^(?:[a-zA-Z0-9](?:[a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?\.)+[a-zA-Z]{2,}$/.test(domain)) {
    alert('Invalid domain format');
    return;
  }

  try {
    const res = await fetch('/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ domain }),
    });
    if (!res.ok) {
      const err = await res.json();
      alert(err.detail || 'Scan failed');
      return;
    }
    const data = await res.json();
    currentScanId = data.scan_id;

    // Reset UI
    setScanning(true);
    resetPipeline();
    clearTerminal();
    startTimer();
    connectSSE(currentScanId);
  } catch (e) {
    alert('Failed to start scan: ' + e.message);
  }
}

function setScanning(active) {
  scanning = active;
  scanBtn.disabled = active;
  scanBtn.classList.toggle('scanning', active);
  scanBtn.querySelector('.btn-text').textContent = active ? 'SCANNING' : 'SCAN';
  domainInput.disabled = active;
  exportPdfBtn.disabled = true;
  exportCsvBtn.disabled = true;
}

function resetPipeline() {
  tools.forEach(t => {
    const el = document.getElementById('step-' + t);
    el.className = 'step';
    document.getElementById('icon-' + t).textContent = '';
  });
  progressFill.style.width = '0%';
}

function clearTerminal() {
  terminalBody.querySelectorAll('.log-line').forEach(el => el.remove());
  terminalEmpty.style.display = 'none';
}

// --- SSE ---
function connectSSE(scanId) {
  if (eventSource) eventSource.close();
  eventSource = new EventSource('/scan/' + scanId + '/stream');

  eventSource.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if (data.type === 'step_start') {
      activateStep(data.tool);
    } else if (data.type === 'step_done') {
      completeStep(data.tool);
    } else if (data.type === 'step_skip') {
      skipStep(data.tool);
    } else if (data.type === 'line') {
      appendLog(data.tool, data.line, data.ts);
    } else if (data.type === 'status') {
      if (data.status === 'completed' || data.status === 'error' || data.status === 'timeout') {
        finishScan(data.status);
      }
    } else if (data.type === 'done') {
      eventSource.close();
      eventSource = null;
    }
  };

  eventSource.onerror = () => {
    eventSource.close();
    eventSource = null;
    if (scanning) finishScan('error');
  };
}

// --- Pipeline Steps ---
function activateStep(tool) {
  // Deactivate all first
  tools.forEach(t => {
    const el = document.getElementById('step-' + t);
    if (el.classList.contains('active')) el.classList.remove('active');
  });
  const el = document.getElementById('step-' + tool);
  el.className = 'step active';
  document.getElementById('icon-' + tool).textContent = '';
  progressFill.style.width = (stepProgress[tool] - 20) + '%';
}

function completeStep(tool) {
  const el = document.getElementById('step-' + tool);
  el.className = 'step done';
  document.getElementById('icon-' + tool).textContent = '\u2713';
  progressFill.style.width = stepProgress[tool] + '%';
}

function skipStep(tool) {
  const el = document.getElementById('step-' + tool);
  el.className = 'step skip';
  document.getElementById('icon-' + tool).textContent = '\u2014';
  progressFill.style.width = stepProgress[tool] + '%';
}

// --- Terminal ---
function appendLog(tool, line, ts) {
  const row = document.createElement('div');
  row.className = 'log-line';

  const timeStr = ts ? new Date(ts * 1000).toLocaleTimeString('en-GB', { hour12: false }) : '';

  row.innerHTML =
    '<span class="log-ts">' + escapeHtml(timeStr) + '</span>' +
    '<span class="log-badge badge-' + escapeHtml(tool) + '">' + escapeHtml(tool) + '</span>' +
    '<span class="log-msg">' + escapeHtml(line) + '</span>';

  terminalBody.insertBefore(row, resumeScrollBtn);

  if (autoScroll) {
    terminalBody.scrollTop = terminalBody.scrollHeight;
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// --- Timer ---
function startTimer() {
  timerStart = Date.now();
  clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 1000);
  updateTimer();
}

function updateTimer() {
  const s = Math.floor((Date.now() - timerStart) / 1000);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  elapsedEl.textContent = String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}

function stopTimer() {
  clearInterval(timerInterval);
}

// --- Finish ---
function finishScan(status) {
  setScanning(false);
  stopTimer();
  progressFill.style.width = '100%';

  if (status === 'completed') {
    exportPdfBtn.disabled = false;
    exportCsvBtn.disabled = false;
  }

  loadHistory();
}

// --- Export ---
function exportPdf() {
  if (currentScanId) window.open('/scan/' + currentScanId + '/export/pdf', '_blank');
}

function exportCsv() {
  if (currentScanId) window.open('/scan/' + currentScanId + '/export/csv', '_blank');
}

// --- Copy Output ---
function copyOutput() {
  const lines = terminalBody.querySelectorAll('.log-line');
  const text = Array.from(lines).map(l => l.textContent).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

// --- History ---
function toggleHistory() {
  document.getElementById('historyToggle').classList.toggle('open');
}

async function loadHistory() {
  try {
    const res = await fetch('/scans');
    const data = await res.json();
    const scans = data.scans || [];
    const body = document.getElementById('historyBody');
    const empty = document.getElementById('historyEmpty');

    document.getElementById('historyTitle').textContent = 'History (' + scans.length + ')';

    if (scans.length === 0) {
      body.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    body.innerHTML = scans.slice(0, 10).map(s => {
      const started = new Date(s.created_at * 1000).toLocaleString();
      let duration = '-';
      if (s.finished_at) {
        const d = Math.floor(s.finished_at - s.created_at);
        duration = Math.floor(d / 60) + 'm ' + (d % 60) + 's';
      }
      const statusClass = 'status-' + s.status;
      return '<tr>' +
        '<td>' + escapeHtml(s.domain) + '</td>' +
        '<td><span class="status-badge ' + statusClass + '">' + escapeHtml(s.status) + '</span></td>' +
        '<td>' + escapeHtml(started) + '</td>' +
        '<td>' + escapeHtml(duration) + '</td>' +
        '<td><button class="view-btn" onclick="viewScan(\'' + escapeHtml(s.id) + '\')">View</button></td>' +
        '</tr>';
    }).join('');
  } catch (e) {
    console.error('Failed to load history:', e);
  }
}

async function viewScan(scanId) {
  try {
    const res = await fetch('/scan/' + scanId + '/result');
    const data = await res.json();
    currentScanId = scanId;

    clearTerminal();
    resetPipeline();

    const results = data.results || [];
    const seenTools = new Set();

    results.forEach(r => {
      appendLog(r.tool, r.line, r.ts);
      if (r.tool !== 'system') seenTools.add(r.tool);
    });

    seenTools.forEach(t => completeStep(t));
    tools.forEach(t => {
      if (!seenTools.has(t)) {
        const el = document.getElementById('step-' + t);
        if (!el.classList.contains('done')) skipStep(t);
      }
    });

    progressFill.style.width = '100%';

    if (data.scan.status === 'completed') {
      exportPdfBtn.disabled = false;
      exportCsvBtn.disabled = false;
    }

    if (data.scan.finished_at && data.scan.created_at) {
      const d = Math.floor(data.scan.finished_at - data.scan.created_at);
      const m = Math.floor(d / 60);
      const sec = d % 60;
      elapsedEl.textContent = String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
    }
  } catch (e) {
    alert('Failed to load scan: ' + e.message);
  }
}

// --- Init ---
loadHistory();
</script>
