<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARGUS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:        #06080c;
  --surface:   #0d1117;
  --elevated:  #151b25;
  --border:    rgba(255,255,255,0.05);
  --border-md: rgba(255,255,255,0.08);
  --border-hi: rgba(255,255,255,0.14);
  --accent:    #3b82f6;
  --accent-lo: rgba(59,130,246,0.08);
  --accent-md: rgba(59,130,246,0.18);
  --txt:       #e2e8f0;
  --txt-2:     #64748b;
  --txt-3:     #334155;
  --green:     #10b981;  --green-lo:  rgba(16,185,129,0.10);
  --blue:      #60a5fa;  --blue-lo:   rgba(96,165,250,0.10);
  --yellow:    #f59e0b;  --yellow-lo: rgba(245,158,11,0.10);
  --red:       #ef4444;  --red-lo:    rgba(239,68,68,0.10);
  --orange:    #f97316;  --orange-lo: rgba(249,115,22,0.10);
  --purple:    #a78bfa;  --purple-lo: rgba(167,139,250,0.10);
  --cyan:      #06b6d4;  --cyan-lo:   rgba(6,182,212,0.10);
  --font: 'Outfit', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', 'DM Mono', 'Consolas', monospace;
  --r: 10px; --r-sm: 6px; --r-lg: 16px;
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
  --glow-accent: 0 0 40px rgba(59,130,246,0.15);
}

::selection { background: rgba(59,130,246,0.30); }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

html, body {
  min-height: 100vh;
  font-family: var(--font);
  background: var(--bg);
  color: var(--txt);
  line-height: 1.5;
}

/* ─── Ambient Background ─── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(59,130,246,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(16,185,129,0.03) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(255,255,255,0.008) 2px,
    rgba(255,255,255,0.008) 4px
  );
  pointer-events: none; z-index: 0;
}

/* ─── Row/card entrance animation ─── */
@keyframes rowSlideIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeReveal {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes sectionReveal {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.reveal-in {
  animation: sectionReveal 0.5s cubic-bezier(0.16,1,0.3,1) both;
}

/* ─── Header ─── */
.header {
  position: sticky; top: 0; z-index: 100;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 clamp(20px, 4vw, 48px);
  background: rgba(6,8,12,0.82);
  backdrop-filter: blur(24px) saturate(1.4);
  -webkit-backdrop-filter: blur(24px) saturate(1.4);
  border-bottom: 1px solid var(--border);
}
.logo { display: flex; align-items: center; gap: 14px; }
.logo-mark {
  width: 34px; height: 34px; border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), #6366f1);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 14px; color: #fff;
  letter-spacing: -0.5px;
  box-shadow: 0 0 20px rgba(59,130,246,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
}
.logo-name {
  font-size: 16px; font-weight: 800; letter-spacing: 3px;
  background: linear-gradient(135deg, #e2e8f0, #94a3b8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.logo-pipe { width: 1px; height: 18px; background: var(--border-hi); }
.logo-sub { font-size: 11px; color: var(--txt-3); font-weight: 400; letter-spacing: 0.5px; }
.ver {
  font-size: 10px; font-family: var(--mono); color: var(--txt-3);
  padding: 3px 10px; border: 1px solid var(--border-md); border-radius: 20px;
  font-weight: 500;
}

/* ─── Page ─── */
.page {
  position: relative; z-index: 1;
  max-width: 1320px;
  margin: 0 auto;
  padding: 40px clamp(20px, 4vw, 48px) 80px;
  display: flex; flex-direction: column; gap: 32px;
}

.sec-label {
  font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
  color: var(--txt-3); text-transform: uppercase; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.sec-label::before {
  content: ''; width: 3px; height: 12px; border-radius: 3px;
  background: var(--accent);
}
.bar-div { width: 1px; height: 18px; background: var(--border); margin: 0 2px; flex-shrink: 0; }
.flex1 { flex: 1; }

/* ─── Target ─── */
.target-wrap { position: relative; }
.target-input {
  width: 100%; height: 58px; padding: 0 160px 0 24px;
  background: var(--surface); border: 1px solid var(--border-md);
  border-radius: var(--r); font-family: var(--mono); font-size: 15px;
  color: var(--txt); outline: none; font-weight: 500;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.02);
  transition: border-color 200ms, box-shadow 200ms;
}
.target-input::placeholder { color: var(--txt-3); font-weight: 400; }
.target-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-lo), 0 2px 20px rgba(0,0,0,0.3), var(--glow-accent);
}
.scan-btn {
  position: absolute; right: 9px; top: 50%; transform: translateY(-50%);
  height: 40px; padding: 0 28px;
  background: linear-gradient(135deg, var(--accent), #6366f1);
  border: none; border-radius: var(--r-sm);
  color: #fff; font-family: var(--font); font-size: 12px; font-weight: 700;
  letter-spacing: 1.5px; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 0 20px rgba(59,130,246,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
  transition: opacity 150ms, box-shadow 150ms, transform 100ms;
}
.scan-btn:hover:not(:disabled) { opacity: 0.92; transform: translateY(-50%) scale(1.02); }
.scan-btn:active:not(:disabled) { transform: translateY(-50%) scale(0.98); }
.scan-btn:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }
.scan-btn.scanning { animation: scanGlow 2.5s ease infinite; }
@keyframes scanGlow {
  0%,100% { box-shadow: 0 0 20px rgba(59,130,246,0.3), inset 0 1px 0 rgba(255,255,255,0.15); }
  50% { box-shadow: 0 0 50px rgba(59,130,246,0.5), inset 0 1px 0 rgba(255,255,255,0.15); }
}
.spin { width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: none; }
.scan-btn.scanning .spin { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Config row ─── */
.cfg-row { display: flex; gap: 12px; align-items: flex-start; }
.tools-drop { position: relative; flex: 1; }
.tools-trigger {
  width: 100%; height: 48px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px;
  background: var(--surface); border: 1px solid var(--border-md);
  border-radius: var(--r-sm); cursor: pointer; user-select: none;
  transition: border-color 150ms, background 150ms, box-shadow 150ms;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
.tools-trigger:hover { border-color: var(--border-hi); background: var(--elevated); }
.tools-trigger.open { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-lo); }
.trig-l { display: flex; align-items: center; gap: 10px; }
.trig-icon { font-size: 14px; opacity: 0.7; }
.trig-lbl { font-size: 13px; font-weight: 600; color: var(--txt); }
.trig-cnt {
  font-size: 10px; font-weight: 700; padding: 2px 10px; border-radius: 20px;
  background: var(--accent-lo); color: var(--accent); font-family: var(--mono);
}
.trig-chev { font-size: 9px; color: var(--txt-3); transition: transform 250ms cubic-bezier(0.16,1,0.3,1); }
.tools-trigger.open .trig-chev { transform: rotate(180deg); }

.tools-panel {
  position: absolute; top: calc(100% + 10px); left: 0; right: 0;
  background: var(--surface); border: 1px solid var(--border-hi);
  border-radius: var(--r); overflow: hidden;
  box-shadow: var(--shadow), 0 0 0 1px rgba(255,255,255,0.02);
  z-index: 200; display: none;
  animation: popIn 200ms cubic-bezier(0.16,1,0.3,1);
}
.tools-panel.open { display: block; }
@keyframes popIn { from{opacity:0;transform:translateY(-10px) scale(0.97)} to{opacity:1;transform:none} }

.panel-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 12px; border-bottom: 1px solid var(--border);
}
.panel-ttl { font-size: 10px; font-weight: 700; letter-spacing: 2.5px; color: var(--txt-3); text-transform: uppercase; }
.panel-acts { display: flex; gap: 6px; }
.pa-btn {
  font-size: 11px; padding: 4px 12px; border: 1px solid var(--border-md);
  border-radius: 6px; background: transparent; color: var(--txt-2);
  cursor: pointer; font-family: var(--font); font-weight: 500; transition: all 150ms;
}
.pa-btn:hover { color: var(--txt); border-color: var(--accent); background: var(--accent-lo); }

.tools-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 14px; }
.tool-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; border: 1px solid var(--border);
  border-radius: 8px; background: var(--bg);
  cursor: pointer; transition: all 150ms; user-select: none;
}
.tool-item:hover { border-color: var(--border-md); background: var(--elevated); }
.tool-item.on { border-color: var(--accent); background: var(--accent-lo); }
.tool-item.locked { opacity: 0.3; cursor: not-allowed; }
.tool-pip {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  background: var(--border-hi); transition: all 150ms;
}
.tool-item.on .tool-pip { background: var(--accent); box-shadow: 0 0 10px rgba(59,130,246,0.6); }
.tool-n { font-size: 12px; font-weight: 600; }
.tool-d { font-size: 10px; color: var(--txt-3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.panel-foot {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 18px; border-top: 1px solid var(--border); background: var(--bg);
}
.wl-lbl { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: var(--txt-3); text-transform: uppercase; white-space: nowrap; }
.wl-seg { display: flex; border: 1px solid var(--border-md); border-radius: 7px; overflow: hidden; }
.wl-btn {
  padding: 5px 14px; font-size: 11px; border: none; cursor: pointer;
  font-family: var(--font); font-weight: 600; background: transparent;
  color: var(--txt-2); transition: all 150ms;
}
.wl-btn.on { background: var(--accent); color: #fff; }
.wl-field { flex: 1; height: 32px; padding: 0 12px; font-size: 11px; background: var(--elevated); color: var(--txt); border: 1px solid var(--border-md); border-radius: 7px; font-family: var(--mono); outline: none; display: none; transition: border-color 150ms; }
.wl-field:focus { border-color: var(--accent); }
.wl-field.show { display: block; }

/* ─── Elapsed ─── */
.elapsed-box {
  flex-shrink: 0; height: 48px; padding: 0 20px; min-width: 100px;
  background: var(--surface); border: 1px solid var(--border-md);
  border-radius: var(--r-sm); display: flex; align-items: center; gap: 10px;
  font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--txt-2);
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
.el-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--txt-3); flex-shrink: 0; transition: all 300ms; }
.el-dot.live { background: var(--green); animation: pulse 1.8s ease infinite; box-shadow: 0 0 12px rgba(16,185,129,0.5); }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(1.5)} }

/* ─── Progress Section ─── */
.progress-section {
  background: var(--surface);
  border: 1px solid var(--border-md);
  border-radius: var(--r-lg);
  padding: 24px 28px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.25);
  position: relative;
  overflow: hidden;
}
.progress-section::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.3;
}
.progress-section .sec-label { margin-bottom: 20px; }

.pipeline {
  display: flex; align-items: center; gap: 0; overflow-x: auto;
  padding-bottom: 6px;
}
.pipe-step {
  display: flex; flex-direction: column; align-items: center;
  gap: 8px; min-width: 90px; padding: 0 10px; position: relative;
  flex-shrink: 0;
}
.pipe-step:not(:first-child)::before {
  content: '';
  position: absolute; left: 0; top: 16px;
  width: 1px; height: 1px;
  border-top: 1px dashed var(--border-hi);
  width: 100%;
  transform: translateX(-50%);
  z-index: 0;
}
.pipe-connector {
  flex: 1; height: 1px; min-width: 16px; flex-shrink: 1;
  position: relative;
  background: var(--border-md);
}
.pipe-connector::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, var(--accent), transparent);
  opacity: 0;
  transition: opacity 400ms;
}
.pipe-icon {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; z-index: 1;
  background: var(--elevated); border: 2px solid var(--border-md);
  color: var(--txt-3); transition: all 300ms cubic-bezier(0.16,1,0.3,1);
}
.pipe-step[data-state="pending"] .pipe-icon { background: var(--elevated); border-color: var(--border-md); color: var(--txt-3); }
.pipe-step[data-state="running"] .pipe-icon {
  background: var(--accent-lo); border-color: var(--accent); color: var(--accent);
  box-shadow: 0 0 20px rgba(59,130,246,0.3);
}
.pipe-step[data-state="done"] .pipe-icon {
  background: var(--green-lo); border-color: var(--green); color: var(--green);
  box-shadow: 0 0 16px rgba(16,185,129,0.25);
}
.pipe-step[data-state="skipped"] .pipe-icon { background: var(--elevated); border-color: var(--border); color: var(--txt-3); opacity: 0.5; }
.pipe-step[data-state="error"] .pipe-icon {
  background: var(--red-lo); border-color: var(--red); color: var(--red);
  box-shadow: 0 0 16px rgba(239,68,68,0.25);
}
.pipe-spinner {
  width: 15px; height: 15px; border: 2px solid var(--accent-md);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .6s linear infinite;
}
.pipe-name { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; color: var(--txt-2); text-transform: uppercase; }
.pipe-count { font-size: 10px; font-family: var(--mono); color: var(--txt-3); min-height: 14px; font-weight: 500; }

/* ─── Stats Bar ─── */
.stats-bar {
  display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px;
  padding-top: 18px; border-top: 1px solid var(--border);
}
.stat-chip {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 16px; border-radius: 10px; border: 1px solid var(--border-md);
  background: var(--elevated); font-size: 12px;
  animation: fadeReveal 0.3s ease both;
}
.stat-chip.subdomain { border-color: rgba(6,182,212,0.2); }
.stat-chip.livehost  { border-color: rgba(16,185,129,0.2); }
.stat-chip.port      { border-color: rgba(239,68,68,0.2); }
.stat-chip.waf       { border-color: rgba(249,115,22,0.2); }
.stat-chip.tech      { border-color: rgba(167,139,250,0.2); }
.stat-val { font-family: var(--mono); font-weight: 700; font-size: 16px; }
.stat-chip.subdomain .stat-val { color: var(--cyan); }
.stat-chip.livehost  .stat-val { color: var(--green); }
.stat-chip.port      .stat-val { color: var(--red); }
.stat-chip.waf       .stat-val { color: var(--orange); }
.stat-chip.tech      .stat-val { color: var(--purple); }
.stat-label { color: var(--txt-2); font-size: 11px; font-weight: 500; }

/* ─── Results Section ─── */
.results-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.results-header .sec-label { margin: 0; }
.global-export { display: flex; align-items: center; gap: 8px; }
.exp-btn {
  padding: 6px 16px; border: 1px solid var(--border-md); border-radius: 8px;
  background: transparent; color: var(--txt-2); font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: var(--font); transition: all 150ms;
}
.exp-btn:hover:not(:disabled) {
  background: var(--accent); color: #fff; border-color: var(--accent);
  box-shadow: 0 0 16px rgba(59,130,246,0.3);
}
.exp-btn:disabled { opacity: 0.2; cursor: not-allowed; }

/* ─── Result Panel ─── */
.result-panel {
  background: var(--surface); border: 1px solid var(--border-md);
  border-radius: var(--r-lg); overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  margin-bottom: 14px;
  transition: border-color 300ms, box-shadow 300ms;
  animation: fadeReveal 0.4s cubic-bezier(0.16,1,0.3,1) both;
}
.result-panel.active {
  border-color: var(--accent-md);
  box-shadow: 0 4px 20px rgba(0,0,0,0.25), 0 0 30px rgba(59,130,246,0.08);
}

.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; cursor: pointer; user-select: none;
  background: var(--elevated); gap: 12px;
  transition: background 150ms;
  position: relative;
}
.panel-header::after {
  content: '';
  position: absolute; bottom: 0; left: 20px; right: 20px; height: 1px;
  background: linear-gradient(90deg, var(--border-md), transparent);
}
.panel-header:hover { background: rgba(255,255,255,0.025); }
.ph-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
.ph-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

.panel-tool-badge {
  font-size: 9px; font-weight: 700; padding: 4px 10px;
  border-radius: 6px; text-transform: uppercase; letter-spacing: 1.2px;
  white-space: nowrap; flex-shrink: 0;
}
.t-httpx   { background: var(--green-lo);  color: var(--green); }
.t-nmap    { background: var(--red-lo);    color: var(--red); }
.t-dig     { background: var(--cyan-lo);   color: var(--cyan); }
.t-whois   { background: var(--cyan-lo);   color: var(--cyan); }
.t-wafw00f { background: var(--orange-lo); color: var(--orange); }
.t-whatweb { background: var(--purple-lo); color: var(--purple); }
.t-ffuf    { background: var(--yellow-lo); color: var(--yellow); }

.panel-title { font-size: 13px; font-weight: 600; color: var(--txt); }
.panel-count {
  font-size: 11px; font-family: var(--mono); font-weight: 700;
  padding: 3px 10px; border-radius: 20px;
  background: var(--accent-lo); color: var(--accent);
}

.panel-search {
  height: 32px; padding: 0 12px; width: 180px;
  background: var(--bg); border: 1px solid var(--border-md);
  border-radius: 8px; font-size: 11px; font-family: var(--mono);
  color: var(--txt); outline: none; transition: border-color 150ms, box-shadow 150ms;
}
.panel-search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-lo); }
.panel-search::placeholder { color: var(--txt-3); }

.panel-csv-btn {
  padding: 5px 13px; border: 1px solid var(--border-md); border-radius: 8px;
  background: transparent; color: var(--txt-2); font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: var(--font); transition: all 150ms; white-space: nowrap;
}
.panel-csv-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

.panel-chevron {
  font-size: 10px; color: var(--txt-3);
  transition: transform 250ms cubic-bezier(0.16,1,0.3,1); flex-shrink: 0;
}
.result-panel.collapsed .panel-chevron { transform: rotate(-90deg); }

.panel-body {
  overflow: hidden;
  max-height: 560px;
  overflow-y: auto;
  transition: max-height 300ms cubic-bezier(0.16,1,0.3,1);
}
.result-panel.collapsed .panel-body {
  max-height: 0;
  overflow: hidden;
}

.panel-empty {
  padding: 40px; text-align: center;
  color: var(--txt-3); font-size: 12px; font-family: var(--mono);
  font-weight: 500;
}

/* ─── Data Table (shared) ─── */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  padding: 10px 18px; color: var(--txt-3); font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.2px; text-align: left;
  border-bottom: 1px solid var(--border); background: var(--bg);
  white-space: nowrap; position: sticky; top: 0; z-index: 2;
}
.data-table th.sortable { cursor: pointer; }
.data-table th.sortable:hover { color: var(--accent); }
.data-table th.sort-asc::after  { content: ' ↑'; color: var(--accent); }
.data-table th.sort-desc::after { content: ' ↓'; color: var(--accent); }
.data-table td {
  padding: 11px 18px; border-bottom: 1px solid var(--border);
  font-size: 12px; vertical-align: middle;
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: rgba(59,130,246,0.03); }
.data-table tr.filtered { display: none; }
.data-table tbody tr {
  animation: rowSlideIn 0.25s cubic-bezier(0.16,1,0.3,1) both;
}
.mono { font-family: var(--mono); }
.version { font-size: 11px; color: var(--txt-2); }

/* ─── Clickable links ─── */
.mono-link {
  font-family: var(--mono); color: var(--accent);
  text-decoration: none; font-size: 12px;
  word-break: break-all;
  transition: color 150ms;
}
.mono-link:hover { text-decoration: underline; color: #93c5fd; }

/* ─── Status code badges ─── */
.sc-badge {
  display: inline-block; padding: 2px 8px; border-radius: 6px;
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  white-space: nowrap;
}
.sc-badge.s2xx { background: var(--green-lo);  color: var(--green); }
.sc-badge.s3xx { background: var(--blue-lo);   color: var(--blue); }
.sc-badge.s4xx { background: var(--yellow-lo); color: var(--yellow); }
.sc-badge.s5xx { background: var(--red-lo);    color: var(--red); }
.sc-badge.s0   { background: rgba(255,255,255,0.04); color: var(--txt-3); }

/* ─── State badges (nmap) ─── */
.state-badge {
  display: inline-block; padding: 2px 8px; border-radius: 6px;
  font-family: var(--mono); font-size: 11px; font-weight: 600;
}
.state-open     { background: var(--green-lo);  color: var(--green); }
.state-closed   { background: var(--red-lo);    color: var(--red); }
.state-filtered { background: rgba(255,255,255,0.04); color: var(--txt-3); }

/* ─── Tech chips ─── */
.tech-chip {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 10px; background: var(--elevated); border: 1px solid var(--border-md);
  color: var(--txt-2); margin: 2px 2px 2px 0;
  font-family: var(--mono); font-weight: 500;
  transition: border-color 150ms;
}
.tech-chip:hover { border-color: var(--accent); }
.tech-cell { min-width: 140px; }

/* ─── WHOIS Card ─── */
.whois-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 1px; background: var(--border); margin: 1px;
}
.whois-cell {
  background: var(--surface); padding: 16px 20px;
  animation: rowSlideIn 0.25s cubic-bezier(0.16,1,0.3,1) both;
}
.whois-cell--full { grid-column: 1 / -1; }
.whois-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  color: var(--txt-3); text-transform: uppercase; margin-bottom: 6px;
}
.whois-value { font-size: 13px; font-family: var(--mono); color: var(--txt); font-weight: 500; }
.whois-ns-item {
  font-size: 12px; font-family: var(--mono); color: var(--txt); font-weight: 500;
  padding: 3px 0;
}

/* ─── DNS Records ─── */
.dns-container { padding: 4px 0; }
.dns-section { margin-bottom: 4px; }
.dns-type-header {
  font-size: 10px; font-weight: 700; letter-spacing: 2px;
  color: var(--cyan); text-transform: uppercase;
  padding: 10px 18px; background: rgba(6,182,212,0.05);
  border-bottom: 1px solid var(--border);
}

/* ─── WAF Cards ─── */
.waf-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1px; background: var(--border); margin: 1px;
}
.waf-card {
  background: var(--surface); padding: 16px 18px;
  display: flex; align-items: flex-start; gap: 14px;
  animation: rowSlideIn 0.25s cubic-bezier(0.16,1,0.3,1) both;
}
.waf-status-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px;
}
.waf-on  { background: var(--red); box-shadow: 0 0 10px rgba(239,68,68,0.5); }
.waf-off { background: var(--green); box-shadow: 0 0 10px rgba(16,185,129,0.5); }
.waf-info { min-width: 0; }
.waf-url {
  font-family: var(--mono); font-size: 12px; color: var(--txt); font-weight: 500;
  word-break: break-all; margin-bottom: 4px;
}
.waf-name { font-weight: 700; color: var(--red); }
.waf-none { color: var(--green); font-size: 12px; font-weight: 500; }
.waf-vendor { font-size: 11px; color: var(--txt-3); }

/* ─── FFUF host header ─── */
.ffuf-host-header {
  padding: 10px 18px; background: var(--elevated);
  border-bottom: 1px solid var(--border);
  font-size: 11px; color: var(--txt-2);
  display: flex; align-items: center; gap: 10px;
}
.ffuf-host-header .fuzz-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  color: var(--yellow); text-transform: uppercase;
  background: var(--yellow-lo); padding: 3px 9px; border-radius: 5px;
}
.ffuf-host-header .fuzz-target {
  font-family: var(--mono); color: var(--txt); font-weight: 500;
}

/* ─── History ─── */
.hist-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; padding: 4px 0; }
.hist-chev { font-size: 9px; color: var(--txt-3); transition: transform 250ms cubic-bezier(0.16,1,0.3,1); }
.hist-toggle.open .hist-chev { transform: rotate(90deg); }
.hist-body { display: none; margin-top: 14px; }
.hist-toggle.open + .hist-body { display: block; }
.hist-card {
  background: var(--surface); border: 1px solid var(--border-md);
  border-radius: var(--r-lg); overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
}
.h-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.h-table th {
  padding: 12px 20px; color: var(--txt-3); font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.2px; text-align: left;
  border-bottom: 1px solid var(--border); background: var(--bg);
}
.h-table td { padding: 12px 20px; border-bottom: 1px solid var(--border); }
.h-table tr:last-child td { border-bottom: none; }
.h-table tr:hover td { background: rgba(59,130,246,0.03); }
.s-badge { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 6px; }
.s-running{background:var(--orange-lo);color:var(--orange)}
.s-completed{background:var(--green-lo);color:var(--green)}
.s-error{background:var(--red-lo);color:var(--red)}
.s-queued{background:rgba(255,255,255,0.05);color:var(--txt-3)}
.h-view {
  padding: 5px 12px; border: 1px solid var(--border-md); border-radius: 6px;
  background: transparent; color: var(--txt-3); font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: var(--font); transition: all 150ms;
}
.h-view:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-lo); }
.h-empty { padding: 28px; text-align: center; color: var(--txt-3); font-size: 12px; font-weight: 500; }

/* ─── Responsive ─── */
@media (max-width: 768px) {
  .tools-grid { grid-template-columns: repeat(2, 1fr); }
  .cfg-row { flex-direction: column; }
  .elapsed-box { width: 100%; }
  .waf-grid { grid-template-columns: 1fr; }
  .whois-grid { grid-template-columns: 1fr; }
  .panel-search { width: 120px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-mark">A</div>
    <span class="logo-name">ARGUS</span>
    <div class="logo-pipe"></div>
    <span class="logo-sub">Automated Recon &amp; Gathering Utility System</span>
  </div>
  <span class="ver">v1.1</span>
</header>

<div class="page">

  <!-- Target -->
  <div>
    <div class="sec-label">Target</div>
    <div class="target-wrap">
      <input class="target-input" id="domainInput" placeholder="example.com" autocomplete="off" spellcheck="false">
      <button class="scan-btn" id="scanBtn" onclick="startScan()">
        <div class="spin"></div>
        <span id="btnLbl">SCAN</span>
      </button>
    </div>
  </div>

  <!-- Config -->
  <div>
    <div class="sec-label">Configuration</div>
    <div class="cfg-row">
      <div class="tools-drop" id="toolsDrop">
        <div class="tools-trigger" id="toolsTrigger" onclick="toggleDropdown()">
          <div class="trig-l">
            <span class="trig-icon">&#9881;</span>
            <span class="trig-lbl">Recon Tools</span>
            <span class="trig-cnt" id="toolsCount">0</span>
          </div>
          <span class="trig-chev">&#9660;</span>
        </div>
        <div class="tools-panel" id="toolsPanel">
          <div class="panel-hdr">
            <span class="panel-ttl">Select Tools</span>
            <div class="panel-acts">
              <button class="pa-btn" onclick="selectAll()">All</button>
              <button class="pa-btn" onclick="selectNone()">None</button>
            </div>
          </div>
          <div class="tools-grid" id="toolsGrid"></div>
          <div class="panel-foot">
            <span class="wl-lbl">Wordlist</span>
            <div class="wl-seg">
              <button class="wl-btn on" id="wlDef" onclick="setWl('default')">Default</button>
              <button class="wl-btn" id="wlCust" onclick="setWl('custom')">Custom</button>
            </div>
            <input class="wl-field" id="wlPath" placeholder="/path/to/wordlist.txt" spellcheck="false">
          </div>
        </div>
      </div>
      <div class="elapsed-box">
        <div class="el-dot" id="elDot"></div>
        <span id="elTime">00:00</span>
      </div>
    </div>
  </div>

  <!-- Scan Progress -->
  <div id="progressSection" style="display:none">
    <div class="progress-section">
      <div class="sec-label">Scan Progress</div>
      <div class="pipeline" id="pipeline"></div>
      <div class="stats-bar" id="statsBar"></div>
    </div>
  </div>

  <!-- Results -->
  <div id="resultsSection" style="display:none">
    <div class="results-header">
      <div class="sec-label" style="margin:0">Results</div>
      <div class="global-export">
        <button class="exp-btn" id="expPdf" onclick="doExport('pdf')" disabled>PDF Report</button>
        <button class="exp-btn" id="expCsv" onclick="doExport('csv')" disabled>Full CSV</button>
      </div>
    </div>
    <div id="resultPanels"></div>
  </div>

  <!-- History -->
  <div>
    <div class="hist-toggle" id="histToggle" onclick="toggleHist()">
      <span class="hist-chev">&#9654;</span>
      <span class="sec-label" style="margin:0">Scan History <span id="histCount" style="color:var(--txt-3);font-weight:400">(0)</span></span>
    </div>
    <div class="hist-body" id="histBody">
      <div class="hist-card">
        <table class="h-table">
          <thead><tr><th>Domain</th><th>Status</th><th>Tools</th><th>Started</th><th>Duration</th><th></th></tr></thead>
          <tbody id="histRows"></tbody>
        </table>
        <div class="h-empty" id="histEmpty">No scans recorded yet</div>
      </div>
    </div>
  </div>

</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const STATE = {
  scanning: false,
  scanId: null,
  domain: null,
  timerStart: 0,
  timerInterval: null,
  eventSource: null,
  selectedTools: new Set(),
  toolsMeta: {},
  wordlistMode: 'default',
  panelOpen: false,
  store: {},
  pipeline: {},
  stats: { subdomains: 0, liveHosts: 0, openPorts: 0, wafsDetected: 0, techs: new Set() },
  ffufHosts: new Set(),
  firstResultScrolled: false,
};

const TOOL_INFO = {
  httpx:   { label: 'HTTP Probing', desc: 'Subdomains &amp; HTTP probe' },
  nmap:    { label: 'Port Scan',    desc: 'Open ports &amp; services' },
  dig:     { label: 'DNS Records',  desc: 'A, MX, NS, TXT, CNAME' },
  whois:   { label: 'WHOIS',        desc: 'Domain registration info' },
  wafw00f: { label: 'WAF Detect',   desc: 'Firewall detection' },
  whatweb: { label: 'Tech Fingerprint', desc: 'CMS, frameworks, stack' },
  ffuf:    { label: 'Dir Fuzz',     desc: 'Hidden paths &amp; endpoints' },
};

// ─── DOM helpers ─────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}
function statusClass(sc) {
  sc = +sc;
  if (sc >= 200 && sc < 300) return 's2xx';
  if (sc >= 300 && sc < 400) return 's3xx';
  if (sc >= 400 && sc < 500) return 's4xx';
  if (sc >= 500)             return 's5xx';
  return 's0';
}
function safeUrl(url) {
  try {
    const u = new URL(url);
    if (u.protocol !== 'http:' && u.protocol !== 'https:') return null;
    return u.href;
  } catch { return null; }
}

// Auto-scroll to results on first data
function scrollToResults() {
  if (!STATE.firstResultScrolled && STATE.scanning) {
    STATE.firstResultScrolled = true;
    const el = $('resultsSection');
    if (el) {
      setTimeout(() => {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 200);
    }
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadTools();
loadHistory();

// ─── Tools Dropdown ───────────────────────────────────────────────────────────
async function loadTools() {
  try {
    const r = await fetch('/tools'), d = await r.json();
    STATE.toolsMeta = d.tools;
    const defs = d.defaults || [], grid = $('toolsGrid');
    grid.innerHTML = '';
    Object.entries(STATE.toolsMeta)
      .sort((a, b) => a[1].order - b[1].order)
      .forEach(([id, info]) => {
        if (defs.includes(id)) STATE.selectedTools.add(id);
        const el = document.createElement('div');
        el.className = 'tool-item' + (defs.includes(id) ? ' on' : '');
        el.dataset.tool = id;
        el.onclick = () => { if (!STATE.scanning) toggleTool(id, el); };
        el.innerHTML = `<div class="tool-pip"></div><div><div class="tool-n">${esc(info.name || id)}</div><div class="tool-d">${esc(info.description || '')}</div></div>`;
        grid.appendChild(el);
      });
    updateCount();
  } catch (e) { console.error(e); }
}

function toggleTool(id, el) {
  STATE.selectedTools.has(id)
    ? (STATE.selectedTools.delete(id), el.classList.remove('on'))
    : (STATE.selectedTools.add(id), el.classList.add('on'));
  updateCount();
}
function selectAll() {
  document.querySelectorAll('.tool-item').forEach(el => { STATE.selectedTools.add(el.dataset.tool); el.classList.add('on'); });
  updateCount();
}
function selectNone() {
  document.querySelectorAll('.tool-item').forEach(el => { STATE.selectedTools.delete(el.dataset.tool); el.classList.remove('on'); });
  updateCount();
}
function updateCount() { $('toolsCount').textContent = STATE.selectedTools.size; }

function toggleDropdown() {
  STATE.panelOpen = !STATE.panelOpen;
  $('toolsPanel').classList.toggle('open', STATE.panelOpen);
  $('toolsTrigger').classList.toggle('open', STATE.panelOpen);
}
document.addEventListener('click', e => {
  if (STATE.panelOpen && !$('toolsDrop').contains(e.target)) {
    STATE.panelOpen = false;
    $('toolsPanel').classList.remove('open');
    $('toolsTrigger').classList.remove('open');
  }
});
function setWl(m) {
  STATE.wordlistMode = m;
  $('wlDef').classList.toggle('on', m === 'default');
  $('wlCust').classList.toggle('on', m === 'custom');
  $('wlPath').classList.toggle('show', m === 'custom');
}

// ─── Scan Lifecycle ───────────────────────────────────────────────────────────
$('domainInput').addEventListener('keydown', e => { if (e.key === 'Enter' && !STATE.scanning) startScan(); });

async function startScan() {
  const domain = $('domainInput').value.trim();
  if (!domain || STATE.scanning) return;
  if (!/^(?:[a-zA-Z0-9](?:[a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?\.)+[a-zA-Z]{2,}$/.test(domain)) { alert('Invalid domain'); return; }
  if (!STATE.selectedTools.size) { alert('Select at least one tool'); return; }
  const wl = STATE.wordlistMode === 'custom' ? ($('wlPath').value.trim() || 'default') : 'default';
  try {
    const res = await fetch('/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ domain, tools: [...STATE.selectedTools], wordlist: wl }),
    });
    if (!res.ok) { const e = await res.json(); alert(e.detail || 'Error'); return; }
    const d = await res.json();
    STATE.scanId = d.scan_id;
    STATE.domain = domain;
    setScan(true);
    clearResults();
    startTimer();
    connectSSE(STATE.scanId);
  } catch (e) { alert(e.message); }
}

function setScan(on) {
  STATE.scanning = on;
  const btn = $('scanBtn');
  btn.disabled = on; btn.classList.toggle('scanning', on);
  $('btnLbl').textContent = on ? 'SCANNING' : 'SCAN';
  $('domainInput').disabled = on;
  $('elDot').classList.toggle('live', on);
  if (!on) $('elDot').style.background = 'var(--green)';
  $('expPdf').disabled = true; $('expCsv').disabled = true;
  document.querySelectorAll('.tool-item').forEach(el => el.classList.toggle('locked', on));
}

function clearResults() {
  STATE.store = {};
  STATE.pipeline = {};
  STATE.stats = { subdomains: 0, liveHosts: 0, openPorts: 0, wafsDetected: 0, techs: new Set() };
  STATE.ffufHosts = new Set();
  STATE.firstResultScrolled = false;
  $('pipeline').innerHTML = '';
  $('resultPanels').innerHTML = '';
  $('statsBar').innerHTML = '';
  $('progressSection').style.display = 'none';
  $('resultsSection').style.display = 'none';
}

function startTimer() {
  STATE.timerStart = Date.now(); clearInterval(STATE.timerInterval);
  STATE.timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - STATE.timerStart) / 1000);
    $('elTime').textContent = String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
  }, 1000);
}

function finishScan(status) {
  setScan(false); clearInterval(STATE.timerInterval);
  if (status === 'completed') { $('expPdf').disabled = false; $('expCsv').disabled = false; }
  loadHistory();
  Object.keys(STATE.pipeline).forEach(tool => {
    if (STATE.pipeline[tool] === 'running' || STATE.pipeline[tool] === 'pending') {
      if (status === 'error') setPipeState(tool, 'error');
    }
  });
}

// ─── SSE ──────────────────────────────────────────────────────────────────────
function connectSSE(id) {
  if (STATE.eventSource) STATE.eventSource.close();
  STATE.eventSource = new EventSource('/scan/' + id + '/stream');
  STATE.eventSource.onmessage = e => {
    let d;
    try { d = JSON.parse(e.data); } catch { return; }
    switch (d.type) {
      case 'plan':       onPlan(d);              break;
      case 'status':     if (['completed','error','timeout'].includes(d.status)) finishScan(d.status); break;
      case 'step_start': setPipeState(d.tool, 'running'); setActivePanel(d.tool, true); break;
      case 'step_done':  setPipeState(d.tool, 'done', d.count); setActivePanel(d.tool, false); break;
      case 'step_skip':  setPipeState(d.tool, 'skipped'); break;
      case 'line':       onLine(d);              break;
      case 'done':       STATE.eventSource.close(); STATE.eventSource = null; break;
    }
  };
  STATE.eventSource.onerror = () => {
    STATE.eventSource.close(); STATE.eventSource = null;
    if (STATE.scanning) finishScan('error');
  };
}

function onPlan(event) {
  const tools = event.tools || [];
  tools.forEach(t => {
    STATE.store[t] = t === 'whois' ? {} : [];
    STATE.pipeline[t] = 'pending';
  });
  buildPipelineBar(tools);
  buildResultPanels(tools);
  $('progressSection').style.display = '';
  $('resultsSection').style.display = '';
  // Animate sections in
  $('progressSection').querySelector('.progress-section').classList.add('reveal-in');
}

function onLine(event) {
  const { tool, data } = event;
  if (!data || typeof data !== 'object' || !Object.keys(data).length) return;
  switch (tool) {
    case 'httpx':    ingestHttpx(data);   break;
    case 'nmap':     ingestNmap(data);    break;
    case 'dig':      ingestDig(data);     break;
    case 'whois':    ingestWhois(data);   break;
    case 'wafw00f':  ingestWafw00f(data); break;
    case 'whatweb':  ingestWhatweb(data); break;
    case 'ffuf':     ingestFfuf(data);    break;
  }
}

// ─── Pipeline Bar ─────────────────────────────────────────────────────────────
function buildPipelineBar(tools) {
  const pipe = $('pipeline');
  pipe.innerHTML = '';
  tools.forEach((tool, i) => {
    if (i > 0) {
      const c = document.createElement('div');
      c.className = 'pipe-connector';
      pipe.appendChild(c);
    }
    const step = document.createElement('div');
    step.className = 'pipe-step';
    step.id = 'pipe-' + tool;
    step.dataset.tool = tool;
    step.dataset.state = 'pending';
    const info = TOOL_INFO[tool] || {};
    step.innerHTML = `<div class="pipe-icon" id="pipe-icon-${esc(tool)}">&#9675;</div>
      <div class="pipe-name">${esc(tool)}</div>
      <div class="pipe-count" id="pipe-count-${esc(tool)}"></div>`;
    pipe.appendChild(step);
  });
}

function setPipeState(tool, state, count) {
  STATE.pipeline[tool] = state;
  const step = $('pipe-' + tool);
  if (!step) return;
  step.dataset.state = state;
  const icon = $('pipe-icon-' + tool);
  if (icon) {
    if (state === 'running') icon.innerHTML = '<div class="pipe-spinner"></div>';
    else if (state === 'done')    icon.textContent = '\u2713';
    else if (state === 'skipped') icon.textContent = '\u2014';
    else if (state === 'error')   icon.textContent = '\u2715';
    else icon.textContent = '\u25CB';
  }
  const countEl = $('pipe-count-' + tool);
  if (countEl && count !== undefined) countEl.textContent = count + ' results';
}

function setActivePanel(tool, active) {
  const panel = $('panel-' + tool);
  if (panel) {
    panel.classList.toggle('active', active);
    // Auto-scroll to the active panel when tool starts
    if (active && STATE.scanning) {
      setTimeout(() => {
        panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 150);
    }
  }
}

// ─── Result Panels ────────────────────────────────────────────────────────────
function buildResultPanels(tools) {
  const container = $('resultPanels');
  container.innerHTML = '';
  tools.forEach((tool, idx) => {
    const info = TOOL_INFO[tool] || { label: tool, desc: '' };
    const panel = document.createElement('div');
    panel.className = 'result-panel';
    panel.id = 'panel-' + tool;
    panel.style.animationDelay = (idx * 0.06) + 's';

    panel.innerHTML = `
      <div class="panel-header" onclick="togglePanel('${esc(tool)}')">
        <div class="ph-left">
          <span class="panel-tool-badge t-${esc(tool)}">${esc(tool)}</span>
          <span class="panel-title">${esc(info.label)}</span>
          <span class="panel-count" id="pcount-${esc(tool)}" style="display:none">0</span>
        </div>
        <div class="ph-right">
          <input class="panel-search" id="psearch-${esc(tool)}" placeholder="Filter..." onclick="event.stopPropagation()" oninput="filterPanel('${esc(tool)}')">
          <button class="panel-csv-btn" onclick="event.stopPropagation();exportSection('${esc(tool)}')">&#8595; CSV</button>
          <span class="panel-chevron">&#9660;</span>
        </div>
      </div>
      <div class="panel-body" id="pbody-${esc(tool)}">
        ${buildPanelBody(tool)}
      </div>`;
    container.appendChild(panel);
  });
}

function buildPanelBody(tool) {
  switch (tool) {
    case 'httpx':
      return `<div class="panel-empty" id="empty-httpx">Waiting for data\u2026</div>
        <table class="data-table" id="tbl-httpx" style="display:none">
          <thead><tr>
            <th class="sortable" data-col="0">Subdomain / URL</th>
            <th class="sortable" data-col="1">Host</th>
            <th class="sortable" data-col="2">Status</th>
            <th class="sortable" data-col="3">Title</th>
            <th>Tech Stack</th>
          </tr></thead>
          <tbody id="tbody-httpx"></tbody>
        </table>`;
    case 'nmap':
      return `<div class="panel-empty" id="empty-nmap">Waiting for data\u2026</div>
        <table class="data-table" id="tbl-nmap" style="display:none">
          <thead><tr>
            <th class="sortable" data-col="0">Port</th>
            <th>Protocol</th>
            <th class="sortable" data-col="2">State</th>
            <th class="sortable" data-col="3">Service</th>
            <th>Version</th>
          </tr></thead>
          <tbody id="tbody-nmap"></tbody>
        </table>`;
    case 'dig':
      return `<div class="panel-empty" id="empty-dig">Waiting for data\u2026</div>
        <div class="dns-container" id="dns-container" style="display:none"></div>`;
    case 'whois':
      return `<div class="panel-empty" id="empty-whois">Waiting for data\u2026</div>
        <div class="whois-grid" id="whois-grid" style="display:none"></div>`;
    case 'wafw00f':
      return `<div class="panel-empty" id="empty-wafw00f">Waiting for data\u2026</div>
        <div class="waf-grid" id="waf-grid" style="display:none"></div>`;
    case 'whatweb':
      return `<div class="panel-empty" id="empty-whatweb">Waiting for data\u2026</div>
        <table class="data-table" id="tbl-whatweb" style="display:none">
          <thead><tr>
            <th class="sortable" data-col="0">URL</th>
            <th class="sortable" data-col="1">Status</th>
            <th>Technologies</th>
          </tr></thead>
          <tbody id="tbody-whatweb"></tbody>
        </table>`;
    case 'ffuf':
      return `<div class="panel-empty" id="empty-ffuf">Waiting for data\u2026</div>
        <div id="ffuf-container" style="display:none">
          <div id="ffuf-host-bar" class="ffuf-host-header" style="display:none">
            <span class="fuzz-label">Fuzzing</span>
            <span class="fuzz-target" id="ffuf-host-label"></span>
          </div>
          <table class="data-table" id="tbl-ffuf">
            <thead><tr>
              <th class="sortable" data-col="0">Full URL</th>
              <th class="sortable" data-col="1">Status</th>
              <th class="sortable" data-col="2">Size</th>
              <th class="sortable" data-col="3">Words</th>
              <th class="sortable" data-col="4">Lines</th>
            </tr></thead>
            <tbody id="tbody-ffuf"></tbody>
          </table>
        </div>`;
    default:
      return `<div class="panel-empty">No display available for this tool.</div>`;
  }
}

function showContent(tool, containerId, tableId) {
  const empty = $('empty-' + tool);
  const content = $(containerId || 'tbl-' + tool);
  if (empty) empty.style.display = 'none';
  if (content) content.style.display = '';
}

// ─── Panel Interactions ───────────────────────────────────────────────────────
function togglePanel(tool) {
  const panel = $('panel-' + tool);
  if (panel) panel.classList.toggle('collapsed');
}

function filterPanel(tool) {
  const input = $('psearch-' + tool);
  if (!input) return;
  const q = input.value.toLowerCase().trim();
  const tbody = $('tbody-' + tool);
  if (tbody) {
    tbody.querySelectorAll('tr').forEach(tr => {
      tr.classList.toggle('filtered', q.length > 0 && !tr.textContent.toLowerCase().includes(q));
    });
  }
  if (tool === 'wafw00f') {
    const grid = $('waf-grid');
    if (grid) grid.querySelectorAll('.waf-card').forEach(card => {
      card.classList.toggle('filtered', q.length > 0 && !card.textContent.toLowerCase().includes(q));
    });
  }
  if (tool === 'dig') {
    const container = $('dns-container');
    if (container) container.querySelectorAll('tr').forEach(tr => {
      tr.classList.toggle('filtered', q.length > 0 && !tr.textContent.toLowerCase().includes(q));
    });
  }
}

function updatePanelCount(tool, n) {
  const el = $('pcount-' + tool);
  if (!el) return;
  el.textContent = n;
  el.style.display = n > 0 ? '' : 'none';
}

// ─── Ingest: HTTPX ───────────────────────────────────────────────────────────
function ingestHttpx(data) {
  if (!data.url) return;
  STATE.store.httpx = STATE.store.httpx || [];
  STATE.store.httpx.push(data);
  STATE.stats.liveHosts++;
  (data.tech || []).forEach(t => STATE.stats.techs.add(t));
  showContent('httpx');
  appendHttpxRow(data);
  updatePanelCount('httpx', STATE.store.httpx.length);
  updateStats();
  scrollToResults();
}

function appendHttpxRow(data) {
  const tbody = $('tbody-httpx');
  if (!tbody) return;
  const sc = data.status_code || 0;
  const techHtml = (data.tech || []).map(t => `<span class="tech-chip">${esc(t)}</span>`).join('');
  const url = safeUrl(data.url);
  const tr = document.createElement('tr');
  tr.dataset.search = ((data.url || '') + ' ' + (data.title || '') + ' ' + (data.host || '') + ' ' + (data.tech || []).join(' ')).toLowerCase();
  tr.innerHTML = `
    <td>${url ? `<a href="${esc(url)}" target="_blank" rel="noopener noreferrer" class="mono-link">${esc(data.url)}</a>` : `<span class="mono">${esc(data.url)}</span>`}</td>
    <td class="mono" style="color:var(--txt-2)">${esc(data.host || '')}</td>
    <td><span class="sc-badge ${statusClass(sc)}">${sc || '\u2014'}</span></td>
    <td style="color:var(--txt-2)">${esc(data.title || '')}</td>
    <td class="tech-cell">${techHtml || '<span style="color:var(--txt-3)">\u2014</span>'}</td>`;
  tbody.appendChild(tr);
}

// ─── Ingest: NMAP ────────────────────────────────────────────────────────────
function ingestNmap(data) {
  STATE.store.nmap = STATE.store.nmap || [];
  STATE.store.nmap.push(data);
  if (data.port && data.state === 'open') STATE.stats.openPorts++;
  if (data.port) {
    showContent('nmap');
    appendNmapRow(data);
    updatePanelCount('nmap', STATE.store.nmap.filter(r => r.port).length);
    updateStats();
    scrollToResults();
  }
}

function appendNmapRow(data) {
  if (!data.port) return;
  const tbody = $('tbody-nmap');
  if (!tbody) return;
  const stateClass = data.state === 'open' ? 'state-open' : data.state === 'closed' ? 'state-closed' : 'state-filtered';
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="mono" style="color:var(--txt)">${esc(String(data.port))}<span style="font-size:10px;color:var(--txt-3)">/${esc(data.protocol || 'tcp')}</span></td>
    <td style="color:var(--txt-3);font-size:11px">${esc(data.protocol || '')}</td>
    <td><span class="state-badge ${stateClass}">${esc(data.state || '')}</span></td>
    <td>${esc(data.service || '')}</td>
    <td class="version">${esc(data.version || '')}</td>`;
  tbody.appendChild(tr);
}

// ─── Ingest: DIG (DNS) ───────────────────────────────────────────────────────
function ingestDig(data) {
  if (!data.type) return;
  STATE.store.dig = STATE.store.dig || [];
  STATE.store.dig.push(data);
  showContent('dig', 'dns-container');
  appendDigRow(data);
  updatePanelCount('dig', STATE.store.dig.length);
  scrollToResults();
}

function appendDigRow(data) {
  const container = $('dns-container');
  if (!container) return;
  const type = data.type || 'OTHER';
  const sectionId = 'dns-tbody-' + type;
  let tbody = $(sectionId);
  if (!tbody) {
    const section = document.createElement('div');
    section.className = 'dns-section';
    section.innerHTML = `<div class="dns-type-header">${esc(type)}</div>
      <table class="data-table">
        <thead><tr><th>Name</th><th>TTL</th><th>Value</th></tr></thead>
        <tbody id="${sectionId}"></tbody>
      </table>`;
    container.appendChild(section);
    tbody = $(sectionId);
  }
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="mono" style="color:var(--txt-2)">${esc(data.name || '')}</td>
    <td class="mono" style="color:var(--txt-3);font-size:11px">${esc(String(data.ttl || ''))}</td>
    <td class="mono">${esc(data.value || '')}</td>`;
  tbody.appendChild(tr);
}

// ─── Ingest: WHOIS ───────────────────────────────────────────────────────────
function ingestWhois(data) {
  if (!data.field) return;
  const store = STATE.store.whois = STATE.store.whois || {};
  if (data.field === 'name server') {
    store.name_servers = store.name_servers || [];
    if (!store.name_servers.includes(data.value)) store.name_servers.push(data.value);
  } else {
    store[data.field] = data.value;
  }
  showContent('whois', 'whois-grid');
  renderWhoisCard();
  const count = Object.keys(store).length + (store.name_servers ? store.name_servers.length - 1 : 0);
  updatePanelCount('whois', count);
  scrollToResults();
}

function renderWhoisCard() {
  const container = $('whois-grid');
  if (!container) return;
  const w = STATE.store.whois || {};
  const fields = [
    ['Registrar',   w['registrar']],
    ['Created',     w['creation']],
    ['Expires',     w['expiration']],
    ['Updated',     w['updated']],
    ['Registrant',  w['registrant']],
    ['Org',         w['org']],
    ['Country',     w['country']],
    ['DNSSEC',      w['dnssec']],
  ];
  container.innerHTML = fields
    .filter(([, v]) => v)
    .map(([label, val]) => `
      <div class="whois-cell">
        <div class="whois-label">${esc(label)}</div>
        <div class="whois-value">${esc(val)}</div>
      </div>`).join('') +
    ((w.name_servers && w.name_servers.length)
      ? `<div class="whois-cell whois-cell--full">
           <div class="whois-label">Name Servers</div>
           ${w.name_servers.map(ns => `<div class="whois-ns-item">${esc(ns)}</div>`).join('')}
         </div>` : '');
}

// ─── Ingest: WAFW00F ─────────────────────────────────────────────────────────
function ingestWafw00f(data) {
  if (!data.url) return;
  STATE.store.wafw00f = STATE.store.wafw00f || [];
  STATE.store.wafw00f.push(data);
  if (data.waf_detected) STATE.stats.wafsDetected++;
  showContent('wafw00f', 'waf-grid');
  appendWafCard(data);
  updatePanelCount('wafw00f', STATE.store.wafw00f.length);
  updateStats();
  scrollToResults();
}

function appendWafCard(data) {
  const grid = $('waf-grid');
  if (!grid) return;
  const detected = data.waf_detected;
  const card = document.createElement('div');
  card.className = 'waf-card';
  const url = safeUrl(data.url);
  card.innerHTML = `
    <div class="waf-status-dot ${detected ? 'waf-on' : 'waf-off'}"></div>
    <div class="waf-info">
      <div class="waf-url">${url ? `<a href="${esc(url)}" target="_blank" rel="noopener noreferrer" class="mono-link">${esc(data.url)}</a>` : esc(data.url)}</div>
      <div>${detected
        ? `<span class="waf-name">${esc(data.waf_name || 'WAF Detected')}</span>${data.waf_vendor && data.waf_vendor !== data.waf_name ? ` <span class="waf-vendor">by ${esc(data.waf_vendor)}</span>` : ''}`
        : `<span class="waf-none">No WAF detected</span>`
      }</div>
    </div>`;
  grid.appendChild(card);
}

// ─── Ingest: WHATWEB ─────────────────────────────────────────────────────────
function ingestWhatweb(data) {
  if (!data.url) return;
  STATE.store.whatweb = STATE.store.whatweb || [];
  STATE.store.whatweb.push(data);
  (data.technologies || []).forEach(t => STATE.stats.techs.add(t));
  showContent('whatweb');
  appendWhatwebRow(data);
  updatePanelCount('whatweb', STATE.store.whatweb.length);
  updateStats();
  scrollToResults();
}

function appendWhatwebRow(data) {
  const tbody = $('tbody-whatweb');
  if (!tbody) return;
  const sc = data.status_code || 0;
  const techHtml = (data.technologies || []).map(t => `<span class="tech-chip">${esc(t)}</span>`).join('');
  const url = safeUrl(data.url);
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>${url ? `<a href="${esc(url)}" target="_blank" rel="noopener noreferrer" class="mono-link">${esc(data.url)}</a>` : `<span class="mono">${esc(data.url)}</span>`}</td>
    <td><span class="sc-badge ${statusClass(sc)}">${sc || '\u2014'}</span></td>
    <td class="tech-cell">${techHtml || '<span style="color:var(--txt-3)">\u2014</span>'}</td>`;
  tbody.appendChild(tr);
}

// ─── Ingest: FFUF ────────────────────────────────────────────────────────────
function ingestFfuf(data) {
  if (!data.path || !data.status_code) return;
  STATE.store.ffuf = STATE.store.ffuf || [];
  STATE.store.ffuf.push(data);

  const container = $('ffuf-container');
  const empty = $('empty-ffuf');
  if (empty) empty.style.display = 'none';
  if (container) container.style.display = '';

  if (data.host) {
    const hostLabel = $('ffuf-host-label');
    const hostBar = $('ffuf-host-bar');
    if (hostBar && hostLabel) {
      if (!STATE.ffufHosts.has(data.host)) {
        STATE.ffufHosts.add(data.host);
        if (STATE.ffufHosts.size === 1) {
          hostLabel.textContent = data.host;
        } else {
          hostLabel.textContent = STATE.ffufHosts.size + ' targets';
        }
        hostBar.style.display = '';
      }
    }
  }

  appendFfufRow(data);
  updatePanelCount('ffuf', STATE.store.ffuf.length);
  scrollToResults();
}

function appendFfufRow(data) {
  const tbody = $('tbody-ffuf');
  if (!tbody) return;
  const host = (data.host || '').replace(/\/$/, '');
  const path = data.path || '';
  const fullUrl = host ? host + (path.startsWith('/') ? path : '/' + path) : path;
  const sc = data.status_code || 0;
  const url = safeUrl(fullUrl);
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>${url ? `<a href="${esc(url)}" target="_blank" rel="noopener noreferrer" class="mono-link">${esc(fullUrl)}</a>` : `<span class="mono">${esc(fullUrl)}</span>`}</td>
    <td><span class="sc-badge ${statusClass(sc)}">${sc}</span></td>
    <td class="mono" style="color:var(--txt-2)">${esc(String(data.size || ''))}</td>
    <td class="mono" style="color:var(--txt-2)">${esc(String(data.words || ''))}</td>
    <td class="mono" style="color:var(--txt-2)">${esc(String(data.lines || ''))}</td>`;
  tbody.appendChild(tr);
}

// ─── Stats Bar ────────────────────────────────────────────────────────────────
function updateStats() {
  const s = STATE.stats;
  const defs = [
    { label: 'Live Hosts',    val: s.liveHosts,    cls: 'livehost' },
    { label: 'Open Ports',    val: s.openPorts,    cls: 'port' },
    { label: 'WAFs Detected', val: s.wafsDetected, cls: 'waf' },
    { label: 'Technologies',  val: s.techs.size,   cls: 'tech' },
  ];
  $('statsBar').innerHTML = defs
    .filter(d => d.val > 0)
    .map(d => `<div class="stat-chip ${d.cls}"><span class="stat-val">${d.val}</span><span class="stat-label">${d.label}</span></div>`)
    .join('');
}

// ─── Export per section ───────────────────────────────────────────────────────
function exportSection(tool) {
  const data = STATE.store[tool];
  if (!data) return;
  const csv = buildCsv(tool, data);
  if (!csv) return;
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `argus_${tool}_${STATE.scanId || 'export'}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

function buildCsv(tool, data) {
  const q = v => '"' + String(v ?? '').replace(/"/g, '""') + '"';
  const row = r => r.map(q).join(',');

  if (tool === 'whois') {
    const rows = [['Field', 'Value']];
    Object.entries(data).forEach(([k, v]) => {
      if (Array.isArray(v)) v.forEach(ns => rows.push([k, ns]));
      else rows.push([k, v]);
    });
    return rows.map(row).join('\r\n');
  }

  if (!Array.isArray(data) || !data.length) return '';

  const schemas = {
    httpx:   { h: ['URL','Host','Status','Title','Server','ContentLength','Tech','RedirectTo'],
               r: d => [d.url,d.host,d.status_code,d.title,d.server,d.content_length,(d.tech||[]).join('; '),d.redirect_to||''] },
    nmap:    { h: ['Port','Protocol','State','Service','Version'],
               r: d => d.port ? [d.port,d.protocol,d.state,d.service,d.version] : null },
    dig:     { h: ['Name','TTL','Type','Value'],
               r: d => [d.name,d.ttl,d.type,d.value] },
    wafw00f: { h: ['URL','WAF_Detected','WAF_Name','WAF_Vendor'],
               r: d => [d.url,d.waf_detected,d.waf_name,d.waf_vendor] },
    whatweb: { h: ['URL','Status','Technologies'],
               r: d => [d.url,d.status_code,(d.technologies||[]).join('; ')] },
    ffuf:    { h: ['URL','Status','Size','Words','Lines'],
               r: d => { const h=(d.host||'').replace(/\/$/,''); const p=d.path||''; return [h+(p.startsWith('/')?p:'/'+p),d.status_code,d.size,d.words,d.lines]; } },
  };
  const s = schemas[tool];
  if (!s) return '';
  const lines = [row(s.h)];
  data.forEach(item => { const r = s.r(item); if (r) lines.push(row(r)); });
  return lines.join('\r\n');
}

function doExport(fmt) {
  if (!STATE.scanId) return;
  window.open('/scan/' + STATE.scanId + '/export/' + fmt, '_blank');
}

// ─── History ──────────────────────────────────────────────────────────────────
function toggleHist() { $('histToggle').classList.toggle('open'); }

async function loadHistory() {
  try {
    const r = await fetch('/scans'), d = await r.json(), scans = d.scans || [];
    $('histCount').textContent = '(' + scans.length + ')';
    const tbody = $('histRows'), empty = $('histEmpty');
    if (!scans.length) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    tbody.innerHTML = scans.slice(0, 10).map(s => {
      const t = new Date(s.created_at * 1000).toLocaleString();
      let dur = '\u2014';
      if (s.finished_at) { const d = Math.floor(s.finished_at - s.created_at); dur = Math.floor(d / 60) + 'm ' + (d % 60) + 's'; }
      return `<tr><td>${esc(s.domain)}</td><td><span class="s-badge s-${s.status}">${esc(s.status)}</span></td><td style="font-size:10px;color:var(--txt-3)">${esc((s.tools || []).join(', '))}</td><td>${esc(t)}</td><td style="font-family:var(--mono);font-size:11px">${esc(dur)}</td><td><button class="h-view" onclick="viewScan('${esc(s.id)}')">View</button></td></tr>`;
    }).join('');
  } catch (e) { console.error(e); }
}

async function viewScan(id) {
  try {
    const r = await fetch('/scan/' + id + '/result'), data = await r.json();
    STATE.scanId = id;
    STATE.domain = data.scan.domain;
    setScan(false); clearResults();

    const tools = data.scan.tools || [];
    onPlan({ tools, tools_info: {} });
    tools.forEach(t => setPipeState(t, 'done'));

    (data.results || []).forEach(row => {
      let d = row.data || {};
      if (typeof d === 'string') try { d = JSON.parse(d); } catch { d = {}; }
      if (row.tool !== 'system' && d && typeof d === 'object' && Object.keys(d).length) {
        onLine({ tool: row.tool, line: row.line, data: d, ts: row.ts });
      }
    });

    $('expPdf').disabled = data.scan.status !== 'completed';
    $('expCsv').disabled = data.scan.status !== 'completed';
    if (data.scan.finished_at && data.scan.created_at) {
      const dur = Math.floor(data.scan.finished_at - data.scan.created_at);
      $('elTime').textContent = String(Math.floor(dur / 60)).padStart(2, '0') + ':' + String(dur % 60).padStart(2, '0');
    }
    // Scroll to results when viewing a past scan
    setTimeout(() => {
      $('resultsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 300);
  } catch (e) { alert(e.message); }
}
