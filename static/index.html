<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARGUS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:        #0c0e12;
  --surface:   #13161d;
  --elevated:  #1a1e28;
  --border:    rgba(255,255,255,0.06);
  --border-md: rgba(255,255,255,0.10);
  --border-hi: rgba(255,255,255,0.16);
  --accent:    #4f8ef7;
  --accent-lo: rgba(79,142,247,0.10);
  --accent-md: rgba(79,142,247,0.20);
  --txt:       #dce3f0;
  --txt-2:     #7a8499;
  --txt-3:     #3d4455;
  --green:     #34d399;  --green-lo:  rgba(52,211,153,0.10);
  --blue:      #60a5fa;  --blue-lo:   rgba(96,165,250,0.10);
  --yellow:    #fbbf24;  --yellow-lo: rgba(251,191,36,0.10);
  --red:       #f87171;  --red-lo:    rgba(248,113,113,0.10);
  --orange:    #fb923c;  --orange-lo: rgba(251,146,60,0.10);
  --purple:    #c084fc;  --purple-lo: rgba(192,132,252,0.10);
  --cyan:      #22d3ee;  --cyan-lo:   rgba(34,211,238,0.10);
  --font: 'Geist', -apple-system, sans-serif;
  --mono: 'Geist Mono', 'Consolas', monospace;
  --r: 12px;  --r-sm: 8px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
}

::selection { background: rgba(79,142,247,0.25); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 4px; }

html, body {
  min-height: 100vh;
  font-family: var(--font);
  background: var(--bg);
  color: var(--txt);
  line-height: 1.5;
}

/* ambient */
body::after {
  content: '';
  position: fixed;
  top: -20vh; left: 50%; transform: translateX(-50%);
  width: 80vw; height: 50vh;
  background: radial-gradient(ellipse, rgba(79,142,247,0.05) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

/* ─── Header ─── */
.header {
  position: sticky; top: 0; z-index: 100;
  height: 54px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px;
  background: rgba(12,14,18,0.88);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.logo { display: flex; align-items: center; gap: 14px; }
.logo-mark {
  width: 32px; height: 32px; border-radius: 9px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px; color: #fff;
  box-shadow: 0 0 24px rgba(79,142,247,0.35);
}
.logo-name { font-size: 15px; font-weight: 700; letter-spacing: 2.5px; }
.logo-pipe { width: 1px; height: 18px; background: var(--border-md); }
.logo-sub { font-size: 11px; color: var(--txt-3); }
.ver { font-size: 10px; font-family: var(--mono); color: var(--txt-3); padding: 3px 9px; border: 1px solid var(--border); border-radius: 5px; }

/* ─── Page ─── */
.page {
  position: relative; z-index: 1;
  max-width: 860px;
  margin: 0 auto;
  padding: 52px 32px 72px;
  display: flex; flex-direction: column; gap: 28px;
}

/* ─── Section label ─── */
.sec-label {
  font-size: 10px; font-weight: 600; letter-spacing: 2px;
  color: var(--txt-3); text-transform: uppercase; margin-bottom: 10px;
}

/* ─── Target ─── */
.target-wrap { position: relative; }
.target-input {
  width: 100%; height: 56px; padding: 0 152px 0 20px;
  background: var(--surface); border: 1px solid var(--border-md);
  border-radius: var(--r); font-family: var(--mono); font-size: 15px;
  color: var(--txt); outline: none;
  box-shadow: 0 2px 16px rgba(0,0,0,0.25);
  transition: border-color 180ms, box-shadow 180ms;
}
.target-input::placeholder { color: var(--txt-3); }
.target-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-lo), 0 2px 16px rgba(0,0,0,0.25);
}
.scan-btn {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  height: 40px; padding: 0 26px;
  background: var(--accent); border: none; border-radius: var(--r-sm);
  color: #fff; font-family: var(--font); font-size: 12px; font-weight: 600;
  letter-spacing: 1px; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 0 24px rgba(79,142,247,0.3);
  transition: opacity 150ms, box-shadow 150ms;
}
.scan-btn:hover:not(:disabled) { opacity: 0.88; }
.scan-btn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }
.scan-btn.scanning { animation: scanGlow 2s ease infinite; }
@keyframes scanGlow { 0%,100%{box-shadow:0 0 24px rgba(79,142,247,0.3)} 50%{box-shadow:0 0 44px rgba(79,142,247,0.55)} }
.spin { width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin .65s linear infinite; display: none; }
.scan-btn.scanning .spin { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Config row ─── */
.cfg-row { display: flex; gap: 12px; align-items: flex-start; }

/* ─── Tools dropdown ─── */
.tools-drop { position: relative; flex: 1; }
.tools-trigger {
  width: 100%; height: 46px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
  background: var(--surface); border: 1px solid var(--border-md);
  border-radius: var(--r-sm); cursor: pointer; user-select: none;
  transition: border-color 150ms, background 150ms;
  box-shadow: 0 1px 8px rgba(0,0,0,0.2);
}
.tools-trigger:hover { border-color: var(--border-hi); background: var(--elevated); }
.tools-trigger.open { border-color: var(--accent); }
.trig-l { display: flex; align-items: center; gap: 10px; }
.trig-icon { font-size: 14px; }
.trig-lbl { font-size: 13px; font-weight: 500; color: var(--txt); }
.trig-cnt {
  font-size: 10px; font-weight: 600; padding: 2px 9px; border-radius: 20px;
  background: var(--accent-lo); color: var(--accent); font-family: var(--mono);
}
.trig-chev { font-size: 9px; color: var(--txt-3); transition: transform 200ms; }
.tools-trigger.open .trig-chev { transform: rotate(180deg); }

.tools-panel {
  position: absolute; top: calc(100% + 10px); left: 0; right: 0;
  background: var(--surface); border: 1px solid var(--border-hi);
  border-radius: var(--r); overflow: hidden;
  box-shadow: var(--shadow), 0 0 0 1px rgba(255,255,255,0.02);
  z-index: 200; display: none;
  animation: popIn 160ms cubic-bezier(0.16,1,0.3,1);
}
.tools-panel.open { display: block; }
@keyframes popIn { from{opacity:0;transform:translateY(-8px) scale(0.98)} to{opacity:1;transform:none} }

.panel-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 12px; border-bottom: 1px solid var(--border);
}
.panel-ttl { font-size: 11px; font-weight: 600; letter-spacing: 2px; color: var(--txt-3); text-transform: uppercase; }
.panel-acts { display: flex; gap: 6px; }
.pa-btn {
  font-size: 11px; padding: 3px 11px; border: 1px solid var(--border-md);
  border-radius: 6px; background: transparent; color: var(--txt-2);
  cursor: pointer; font-family: var(--font); transition: all 120ms;
}
.pa-btn:hover { color: var(--txt); border-color: var(--border-hi); }

.tools-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 14px;
}
.tool-item {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 13px; border: 1px solid var(--border);
  border-radius: 9px; background: var(--bg);
  cursor: pointer; transition: all 130ms; user-select: none;
}
.tool-item:hover { border-color: var(--border-md); background: var(--elevated); }
.tool-item.on { border-color: var(--accent); background: var(--accent-lo); }
.tool-item.locked { opacity: 0.35; cursor: not-allowed; }
.tool-pip { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: var(--border-hi); transition: all 130ms; }
.tool-item.on .tool-pip { background: var(--accent); box-shadow: 0 0 8px rgba(79,142,247,0.6); }
.tool-n { font-size: 12px; font-weight: 600; }
.tool-d { font-size: 10px; color: var(--txt-3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.panel-foot {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 18px; border-top: 1px solid var(--border); background: var(--bg);
}
.wl-lbl { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; color: var(--txt-3); text-transform: uppercase; white-space: nowrap; }
.wl-seg { display: flex; border: 1px solid var(--border-md); border-radius: 7px; overflow: hidden; }
.wl-btn { padding: 5px 14px; font-size: 11px; border: none; cursor: pointer; font-family: var(--font); font-weight: 500; background: transparent; color: var(--txt-2); transition: all 120ms; }
.wl-btn.on { background: var(--accent); color: #fff; }
.wl-field { flex: 1; height: 32px; padding: 0 12px; font-size: 11px; background: var(--elevated); color: var(--txt); border: 1px solid var(--border-md); border-radius: 7px; font-family: var(--mono); outline: none; display: none; transition: border-color 150ms; }
.wl-field:focus { border-color: var(--accent); }
.wl-field.show { display: block; }

/* ─── Elapsed ─── */
.elapsed-box {
  flex-shrink: 0; height: 46px; padding: 0 18px; min-width: 96px;
  background: var(--surface); border: 1px solid var(--border-md);
  border-radius: var(--r-sm); display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 13px; color: var(--txt-2);
  box-shadow: 0 1px 8px rgba(0,0,0,0.2);
}
.el-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--txt-3); flex-shrink: 0; }
.el-dot.live { background: var(--green); animation: pulse 1.5s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(1.45)} }

/* ─── Output ─── */
.output-card {
  background: var(--surface); border: 1px solid var(--border-md);
  border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow);
  display: flex; flex-direction: column;
}

.out-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 18px; border-bottom: 1px solid var(--border);
  background: var(--elevated); flex-wrap: wrap; row-gap: 8px;
}
.tlights { display: flex; gap: 6px; }
.tl { width: 11px; height: 11px; border-radius: 50%; }
.tl-r{background:#ff5f57} .tl-y{background:#ffbd2e} .tl-g{background:#28ca41}
.out-ttl { font-size: 12px; font-weight: 600; letter-spacing: 1.5px; color: var(--txt-2); text-transform: uppercase; }
.out-info { font-family: var(--mono); font-size: 11px; color: var(--txt-3); }
.flex1 { flex: 1; }

/* filter pills */
.f-pills { display: flex; gap: 3px; }
.f-pill {
  padding: 4px 12px; border-radius: 20px; border: 1px solid transparent;
  background: transparent; font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: var(--mono); color: var(--txt-3); transition: all 120ms;
}
.f-pill:hover { color: var(--txt-2); border-color: var(--border-md); }
.f-pill.on[data-f="all"] { background: rgba(255,255,255,0.07); color: var(--txt); border-color: var(--border-md); }
.f-pill.on[data-f="2xx"] { background: var(--green-lo); color: var(--green); border-color: rgba(52,211,153,0.3); }
.f-pill.on[data-f="3xx"] { background: var(--blue-lo); color: var(--blue); border-color: rgba(96,165,250,0.3); }
.f-pill.on[data-f="4xx"] { background: var(--orange-lo); color: var(--orange); border-color: rgba(251,146,60,0.3); }
.f-pill.on[data-f="5xx"] { background: var(--red-lo); color: var(--red); border-color: rgba(248,113,113,0.3); }

.bar-div { width: 1px; height: 18px; background: var(--border); margin: 0 2px; }

/* export */
.exp-grp { display: flex; align-items: center; gap: 5px; }
.exp-chip { font-size: 10px; padding: 3px 8px; border-radius: 5px; border: 1px solid var(--border); background: transparent; color: var(--txt-3); cursor: pointer; font-family: var(--mono); transition: all 80ms; }
.exp-chip.on { border-color: currentColor; }
.exp-chip[data-sc="2xx"].on{color:var(--green)} .exp-chip[data-sc="3xx"].on{color:var(--blue)} .exp-chip[data-sc="4xx"].on{color:var(--orange)} .exp-chip[data-sc="5xx"].on{color:var(--red)}
.exp-btn { padding: 5px 13px; border: 1px solid var(--border-md); border-radius: 6px; background: transparent; color: var(--txt-2); font-size: 11px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: all 120ms; }
.exp-btn:hover:not(:disabled) { background: var(--accent); color: #fff; border-color: var(--accent); }
.exp-btn:disabled { opacity: 0.28; cursor: not-allowed; }
.copy-btn { padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--txt-3); font-size: 11px; cursor: pointer; font-family: var(--font); transition: all 120ms; }
.copy-btn:hover { color: var(--txt); border-color: var(--border-md); }

/* progress */
.prog { height: 1px; background: var(--border); flex-shrink: 0; }
.prog-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), #818cf8); transition: width 400ms ease; }

/* status sub */
.status-sub { display: none; align-items: center; gap: 10px; padding: 9px 18px; border-bottom: 1px solid var(--border); font-size: 11px; }
.status-sub.show { display: flex; }
.run-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: pulse 1.5s ease infinite; }
.step-txt { font-family: var(--mono); color: var(--txt-2); }
.gap1 { flex: 1; }
.live-txt { font-family: var(--mono); font-size: 10px; color: var(--txt-3); }

/* terminal */
.terminal {
  min-height: 360px; max-height: 480px; overflow-y: auto;
  padding: 18px 20px; font-family: var(--mono); font-size: 12px; line-height: 1.9;
  background: var(--bg); position: relative;
}
.term-empty { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--txt-3); }
.term-glyph { font-size: 22px; letter-spacing: -1px; opacity: 0.15; }
.term-txt { font-size: 12px; }
.cursor::after { content: '▊'; animation: blink 1s step-end infinite; opacity: 0.4; font-size: 10px; }
@keyframes blink { 0%,100%{opacity:.4} 50%{opacity:0} }

.line { display: flex; gap: 10px; align-items: baseline; padding: 0.5px 0; animation: li 60ms ease; }
.line.hide { display: none; }
@keyframes li { from{opacity:0;transform:translateX(-3px)} to{opacity:1;transform:none} }
.l-ts { color: var(--txt-3); font-size: 10px; white-space: nowrap; min-width: 64px; }
.l-tool { font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; white-space: nowrap; letter-spacing: 0.5px; }
.t-httpx{background:var(--green-lo);color:var(--green)} .t-subfinder{background:var(--blue-lo);color:var(--blue)} .t-ffuf{background:var(--yellow-lo);color:var(--yellow)} .t-whatweb{background:var(--purple-lo);color:var(--purple)} .t-wafw00f{background:var(--orange-lo);color:var(--orange)} .t-nmap{background:var(--red-lo);color:var(--red)} .t-whois,.t-dig{background:var(--cyan-lo);color:var(--cyan)} .t-system{background:rgba(255,255,255,0.04);color:var(--txt-3)}
.l-sc { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 3px; white-space: nowrap; }
.sc-2{color:var(--green);background:var(--green-lo)} .sc-3{color:var(--blue);background:var(--blue-lo)} .sc-4{color:var(--orange);background:var(--orange-lo)} .sc-5{color:var(--red);background:var(--red-lo)}
.l-msg { color: var(--txt); word-break: break-all; }
.resume-btn { position: sticky; bottom: 8px; float: right; padding: 5px 13px; border: 1px solid var(--border-md); border-radius: 7px; background: var(--elevated); color: var(--txt-2); font-size: 11px; cursor: pointer; display: none; font-family: var(--font); }
.resume-btn.show { display: block; }

/* ─── History ─── */
.hist-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; padding: 4px 0; }
.hist-chev { font-size: 9px; color: var(--txt-3); transition: transform 200ms; }
.hist-toggle.open .hist-chev { transform: rotate(90deg); }
.hist-body { display: none; margin-top: 12px; }
.hist-toggle.open + .hist-body { display: block; }
.hist-card { background: var(--surface); border: 1px solid var(--border-md); border-radius: var(--r); overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.25); }
.h-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.h-table th { padding: 10px 18px; color: var(--txt-3); font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; text-align: left; border-bottom: 1px solid var(--border); background: var(--bg); }
.h-table td { padding: 11px 18px; border-bottom: 1px solid var(--border); }
.h-table tr:last-child td { border-bottom: none; }
.h-table tr:hover td { background: rgba(255,255,255,0.02); }
.s-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
.s-running{background:var(--orange-lo);color:var(--orange)} .s-completed{background:var(--green-lo);color:var(--green)} .s-error{background:var(--red-lo);color:var(--red)} .s-queued{background:rgba(255,255,255,0.05);color:var(--txt-3)}
.h-view { padding: 4px 10px; border: 1px solid var(--border); border-radius: 5px; background: transparent; color: var(--txt-3); font-size: 11px; cursor: pointer; font-family: var(--font); transition: all 120ms; }
.h-view:hover { color: var(--txt); border-color: var(--border-md); }
.h-empty { padding: 24px; text-align: center; color: var(--txt-3); font-size: 12px; }
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-mark">A</div>
    <span class="logo-name">ARGUS</span>
    <div class="logo-pipe"></div>
    <span class="logo-sub">Automated Recon &amp; Gathering Utility System</span>
  </div>
  <span class="ver">v1.1</span>
</header>

<div class="page">

  <!-- Target -->
  <div>
    <div class="sec-label">Target</div>
    <div class="target-wrap">
      <input class="target-input" id="domainInput" placeholder="example.com" autocomplete="off" spellcheck="false">
      <button class="scan-btn" id="scanBtn" onclick="startScan()">
        <div class="spin"></div>
        <span id="btnLbl">SCAN</span>
      </button>
    </div>
  </div>

  <!-- Config -->
  <div>
    <div class="sec-label">Configuration</div>
    <div class="cfg-row">
      <div class="tools-drop" id="toolsDrop">
        <div class="tools-trigger" id="toolsTrigger" onclick="togglePanel()">
          <div class="trig-l">
            <span class="trig-icon">⚙</span>
            <span class="trig-lbl">Recon Tools</span>
            <span class="trig-cnt" id="toolsCount">0</span>
          </div>
          <span class="trig-chev">▼</span>
        </div>

        <div class="tools-panel" id="toolsPanel">
          <div class="panel-hdr">
            <span class="panel-ttl">Select Tools</span>
            <div class="panel-acts">
              <button class="pa-btn" onclick="selectAll()">All</button>
              <button class="pa-btn" onclick="selectNone()">None</button>
            </div>
          </div>
          <div class="tools-grid" id="toolsGrid"></div>
          <div class="panel-foot">
            <span class="wl-lbl">Wordlist</span>
            <div class="wl-seg">
              <button class="wl-btn on" id="wlDef" onclick="setWl('default')">Default</button>
              <button class="wl-btn" id="wlCust" onclick="setWl('custom')">Custom</button>
            </div>
            <input class="wl-field" id="wlPath" placeholder="/path/to/wordlist.txt" spellcheck="false">
          </div>
        </div>
      </div>

      <div class="elapsed-box">
        <div class="el-dot" id="elDot"></div>
        <span id="elTime">00:00</span>
      </div>
    </div>
  </div>

  <!-- Output -->
  <div>
    <div class="sec-label">Output</div>
    <div class="output-card">

      <div class="out-bar">
        <div class="tlights"><div class="tl tl-r"></div><div class="tl tl-y"></div><div class="tl tl-g"></div></div>
        <span class="out-ttl">Terminal</span>
        <span class="out-info" id="outInfo"></span>
        <div class="flex1"></div>
        <div class="f-pills">
          <button class="f-pill on" data-f="all" onclick="setFilter('all',this)">ALL</button>
          <button class="f-pill" data-f="2xx" onclick="setFilter('2xx',this)">2xx</button>
          <button class="f-pill" data-f="3xx" onclick="setFilter('3xx',this)">3xx</button>
          <button class="f-pill" data-f="4xx" onclick="setFilter('4xx',this)">4xx</button>
          <button class="f-pill" data-f="5xx" onclick="setFilter('5xx',this)">5xx</button>
        </div>
        <div class="bar-div"></div>
        <div class="exp-grp">
          <div id="expFilters" style="display:flex;gap:3px">
            <button class="exp-chip on" data-sc="2xx" onclick="this.classList.toggle('on')">2xx</button>
            <button class="exp-chip on" data-sc="3xx" onclick="this.classList.toggle('on')">3xx</button>
            <button class="exp-chip on" data-sc="4xx" onclick="this.classList.toggle('on')">4xx</button>
            <button class="exp-chip on" data-sc="5xx" onclick="this.classList.toggle('on')">5xx</button>
          </div>
          <button class="exp-btn" id="expPdf" onclick="doExport('pdf')" disabled>PDF</button>
          <button class="exp-btn" id="expCsv" onclick="doExport('csv')" disabled>CSV</button>
        </div>
        <div class="bar-div"></div>
        <button class="copy-btn" onclick="copyOutput()">Copy</button>
      </div>

      <div class="prog"><div class="prog-fill" id="progFill"></div></div>

      <div class="status-sub" id="statusSub">
        <div class="run-dot"></div>
        <span class="step-txt" id="stepTxt">Initializing…</span>
        <div class="gap1"></div>
        <span class="live-txt" id="liveTxt"></span>
      </div>

      <div class="terminal" id="terminal">
        <div class="term-empty" id="termEmpty">
          <div class="term-glyph">▸▹▹▹▹</div>
          <div class="term-txt"><span class="cursor">Awaiting target</span></div>
        </div>
        <button class="resume-btn" id="resumeBtn" onclick="resumeScroll()">↓ Resume</button>
      </div>

    </div>
  </div>

  <!-- History -->
  <div>
    <div class="hist-toggle" id="histToggle" onclick="toggleHist()">
      <span class="hist-chev">▶</span>
      <span class="sec-label" style="margin:0">Scan History <span id="histCount" style="color:var(--txt-3);font-weight:400">(0)</span></span>
    </div>
    <div class="hist-body" id="histBody">
      <div class="hist-card">
        <table class="h-table">
          <thead><tr><th>Domain</th><th>Status</th><th>Tools</th><th>Started</th><th>Duration</th><th></th></tr></thead>
          <tbody id="histRows"></tbody>
        </table>
        <div class="h-empty" id="histEmpty">No scans recorded yet</div>
      </div>
    </div>
  </div>

</div>

<script>
let scanning=false, autoScroll=true, currentScanId=null, eventSource=null;
let timerInterval=null, timerStart=0;
let selectedTools=new Set(), toolsMeta={};
let currentFilter='all', wordlistMode='default';
let seenSC=new Set(), lineCount=0, resultCount=0, panelOpen=false;
const $=id=>document.getElementById(id);

loadTools(); loadHistory();

async function loadTools(){
  try{
    const r=await fetch('/tools'), d=await r.json();
    toolsMeta=d.tools;
    const defs=d.defaults||[], grid=$('toolsGrid');
    grid.innerHTML='';
    Object.entries(toolsMeta).sort((a,b)=>a[1].order-b[1].order).forEach(([id,info])=>{
      if(defs.includes(id)) selectedTools.add(id);
      const el=document.createElement('div');
      el.className='tool-item'+(defs.includes(id)?' on':'');
      el.dataset.tool=id;
      el.onclick=()=>{if(!scanning)toggleTool(id,el)};
      el.innerHTML=`<div class="tool-pip"></div><div><div class="tool-n">${esc(info.name||id)}</div><div class="tool-d">${esc(info.description||'')}</div></div>`;
      grid.appendChild(el);
    });
    updateCount();
  }catch(e){console.error(e)}
}
function toggleTool(id,el){selectedTools.has(id)?(selectedTools.delete(id),el.classList.remove('on')):(selectedTools.add(id),el.classList.add('on'));updateCount();}
function selectAll(){document.querySelectorAll('.tool-item').forEach(el=>{selectedTools.add(el.dataset.tool);el.classList.add('on')});updateCount();}
function selectNone(){document.querySelectorAll('.tool-item').forEach(el=>{selectedTools.delete(el.dataset.tool);el.classList.remove('on')});updateCount();}
function updateCount(){$('toolsCount').textContent=selectedTools.size;}

function togglePanel(){
  panelOpen=!panelOpen;
  $('toolsPanel').classList.toggle('open',panelOpen);
  $('toolsTrigger').classList.toggle('open',panelOpen);
}
document.addEventListener('click',e=>{
  if(panelOpen&&!$('toolsDrop').contains(e.target)){
    panelOpen=false;$('toolsPanel').classList.remove('open');$('toolsTrigger').classList.remove('open');
  }
});

function setWl(m){
  wordlistMode=m;
  $('wlDef').classList.toggle('on',m==='default');
  $('wlCust').classList.toggle('on',m==='custom');
  $('wlPath').classList.toggle('show',m==='custom');
}

$('domainInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!scanning)startScan();});
$('terminal').addEventListener('scroll',()=>{
  const t=$('terminal');
  autoScroll=t.scrollHeight-t.scrollTop-t.clientHeight<40;
  $('resumeBtn').classList.toggle('show',!autoScroll&&scanning);
});
function resumeScroll(){autoScroll=true;$('terminal').scrollTop=$('terminal').scrollHeight;$('resumeBtn').classList.remove('show');}

async function startScan(){
  const domain=$('domainInput').value.trim();
  if(!domain||scanning)return;
  if(!/^(?:[a-zA-Z0-9](?:[a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?\.)+[a-zA-Z]{2,}$/.test(domain)){alert('Invalid domain');return;}
  if(!selectedTools.size){alert('Select at least one tool');return;}
  const wl=wordlistMode==='custom'?($('wlPath').value.trim()||'default'):'default';
  try{
    const res=await fetch('/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({domain,tools:[...selectedTools],wordlist:wl})});
    if(!res.ok){const e=await res.json();alert(e.detail||'Error');return;}
    const d=await res.json();
    currentScanId=d.scan_id;seenSC.clear();lineCount=0;resultCount=0;
    setScan(true);clearTerminal();startTimer();connectSSE(currentScanId);
  }catch(e){alert(e.message);}
}

function setScan(on){
  scanning=on;
  const btn=$('scanBtn');btn.disabled=on;btn.classList.toggle('scanning',on);
  $('btnLbl').textContent=on?'SCANNING':'SCAN';$('domainInput').disabled=on;
  $('statusSub').classList.toggle('show',on);$('elDot').classList.toggle('live',on);
  if(!on)$('elDot').style.background='var(--green)';
  $('expPdf').disabled=true;$('expCsv').disabled=true;
  document.querySelectorAll('.tool-item').forEach(el=>el.classList.toggle('locked',on));
}

function clearTerminal(){
  $('terminal').querySelectorAll('.line').forEach(el=>el.remove());
  $('termEmpty').style.display='';$('outInfo').textContent='';$('progFill').style.width='0%';$('liveTxt').textContent='';
}

function connectSSE(id){
  if(eventSource)eventSource.close();
  eventSource=new EventSource('/scan/'+id+'/stream');
  eventSource.onmessage=e=>{
    const d=JSON.parse(e.data);
    if(d.type==='step_start')$('stepTxt').textContent='Running: '+d.tool;
    else if(d.type==='step_done'){resultCount+=d.count||0;$('liveTxt').textContent=resultCount+' results';}
    else if(d.type==='line')appendLog(d.tool,d.line,d.ts,d.data||{});
    else if(d.type==='status'&&['completed','error','timeout'].includes(d.status))finishScan(d.status);
    else if(d.type==='done'){eventSource.close();eventSource=null;}
  };
  eventSource.onerror=()=>{eventSource.close();eventSource=null;if(scanning)finishScan('error');};
}

function appendLog(tool,line,ts,data){
  lineCount++;
  const sc=data.status_code||0;
  let scCls='';
  if(sc>=200&&sc<300)scCls='2xx';else if(sc>=300&&sc<400)scCls='3xx';else if(sc>=400&&sc<500)scCls='4xx';else if(sc>=500)scCls='5xx';
  if(scCls)seenSC.add(sc);
  const row=document.createElement('div');
  row.className='line';
  if(currentFilter!=='all'&&scCls&&scCls!==currentFilter)row.classList.add('hide');
  if(scCls)row.dataset.sc=scCls;
  const ts_s=ts?new Date(ts*1000).toLocaleTimeString('en-GB',{hour12:false}):'';
  const tc='t-'+tool.toLowerCase().replace(/[^a-z0-9]/g,'');
  let html=`<span class="l-ts">${esc(ts_s)}</span><span class="l-tool ${tc}">${esc(tool)}</span>`;
  if(sc)html+=`<span class="l-sc sc-${scCls[0]}">${sc}</span>`;
  html+=`<span class="l-msg">${esc(line)}</span>`;
  row.innerHTML=html;
  $('terminal').insertBefore(row,$('resumeBtn'));
  $('outInfo').textContent=lineCount+' lines';
  if(autoScroll)$('terminal').scrollTop=$('terminal').scrollHeight;
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.f-pill').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  $('terminal').querySelectorAll('.line').forEach(r=>{
    if(f==='all'){r.classList.remove('hide');return;}
    const sc=r.dataset.sc;if(!sc){r.classList.remove('hide');return;}
    r.classList.toggle('hide',sc!==f);
  });
}

function startTimer(){
  timerStart=Date.now();clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    const s=Math.floor((Date.now()-timerStart)/1000);
    $('elTime').textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  },1000);
}

function finishScan(status){
  setScan(false);clearInterval(timerInterval);$('progFill').style.width='100%';
  $('stepTxt').textContent=status==='completed'?'Completed':'Error';
  if(status==='completed'){$('expPdf').disabled=false;$('expCsv').disabled=false;}
  loadHistory();
}

function doExport(fmt){
  if(!currentScanId)return;
  const chips=document.querySelectorAll('#expFilters .exp-chip.on');
  const ranges=[...chips].map(c=>c.dataset.sc),codes=[];
  seenSC.forEach(sc=>{const r=sc>=500?'5xx':sc>=400?'4xx':sc>=300?'3xx':'2xx';if(ranges.includes(r))codes.push(sc);});
  const p=codes.length&&codes.length<seenSC.size?'status_codes='+codes.join(','):'';
  window.open('/scan/'+currentScanId+'/export/'+fmt+(p?'?'+p:''),'_blank');
}

function copyOutput(){
  const text=[...$('terminal').querySelectorAll('.line:not(.hide)')].map(l=>l.textContent).join('\n');
  navigator.clipboard.writeText(text).then(()=>{const b=document.querySelector('.copy-btn');b.textContent='Copied!';setTimeout(()=>b.textContent='Copy',1500);});
}

function toggleHist(){$('histToggle').classList.toggle('open');}

async function loadHistory(){
  try{
    const r=await fetch('/scans'),d=await r.json(),scans=d.scans||[];
    $('histCount').textContent='('+scans.length+')';
    const tbody=$('histRows'),empty=$('histEmpty');
    if(!scans.length){tbody.innerHTML='';empty.style.display='block';return;}
    empty.style.display='none';
    tbody.innerHTML=scans.slice(0,10).map(s=>{
      const t=new Date(s.created_at*1000).toLocaleString();
      let dur='—';
      if(s.finished_at){const d=Math.floor(s.finished_at-s.created_at);dur=Math.floor(d/60)+'m '+(d%60)+'s';}
      return `<tr><td>${esc(s.domain)}</td><td><span class="s-badge s-${s.status}">${esc(s.status)}</span></td><td style="font-size:10px;color:var(--txt-3)">${esc((s.tools||[]).join(', '))}</td><td>${esc(t)}</td><td style="font-family:var(--mono);font-size:11px">${esc(dur)}</td><td><button class="h-view" onclick="viewScan('${s.id}')">View</button></td></tr>`;
    }).join('');
  }catch(e){console.error(e);}
}

async function viewScan(id){
  try{
    const r=await fetch('/scan/'+id+'/result'),data=await r.json();
    currentScanId=id;seenSC.clear();lineCount=0;resultCount=0;clearTerminal();
    (data.results||[]).forEach(r=>{let d=r.data||{};if(typeof d==='string')try{d=JSON.parse(d)}catch(e){d={}}appendLog(r.tool,r.line,r.ts,d);});
    $('progFill').style.width='100%';$('statusSub').classList.add('show');
    $('elDot').classList.remove('live');$('elDot').style.background='var(--green)';
    $('stepTxt').textContent='Completed';
    if(data.scan.status==='completed'){$('expPdf').disabled=false;$('expCsv').disabled=false;}
    if(data.scan.finished_at&&data.scan.created_at){const d=Math.floor(data.scan.finished_at-data.scan.created_at);$('elTime').textContent=String(Math.floor(d/60)).padStart(2,'0')+':'+String(d%60).padStart(2,'0');}
  }catch(e){alert(e.message);}
}

function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
</script>
</body>
</html>
